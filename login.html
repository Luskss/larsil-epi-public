<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitar EPI</title>
  <meta name="theme-color" content="#1e4620" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Solicitar EPI" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="48x48" href="img/favicon.png?v=2" />
  <link rel="shortcut icon" href="img/favicon.png?v=2" />
  <link rel="apple-touch-icon" sizes="192x192" href="img/iconandroid.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <img src="img/branca.png" alt="Logo" style="height:72px;width:72px;object-fit:contain;border-radius:14px" />
          <h1>Solicitar EPI</h1>
          <p>Larsil Florestal</p>
        </div>

        <div id="error-box" class="error-box hidden"></div>

        <form id="form-login">
          <div class="form-group">
            <label for="email">Login</label>
            <input type="text" id="email" placeholder="Seu login" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Já logado (sessão PHP ativa) → vai direto pro app
    fetch('./check-auth.php', { cache: 'no-store', credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d && d.authenticated) window.location.href = 'index.html'; })
      .catch(() => {});

    const form     = document.getElementById('form-login');
    const errBox   = document.getElementById('error-box');
    const btnLogin = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const login = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      errBox.classList.add('hidden');
      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando…';

      try {
        const res  = await fetch('./auth.php', {
          method: 'POST',
          cache: 'no-store',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, senha }),
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          errBox.textContent = data.error || 'Login ou senha incorretos.';
          errBox.classList.remove('hidden');
          btnLogin.disabled = false;
          btnLogin.textContent = 'Entrar';
        } else {
          window.location.href = 'index.html';
        }
      } catch {
        errBox.textContent = 'Erro de conexão com o servidor.';
        errBox.classList.remove('hidden');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
