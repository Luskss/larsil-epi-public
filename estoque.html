<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saldo de Estoque — EPI Manager</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.badge.ok     {background:#dcfce7;color:#15803d}
.badge.baixo  {background:#fee2e2;color:#dc2626}
.badge.sem-min{background:#f1f5f9;color:#64748b}

/* Cascata localização */
.loc-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;padding:14px 16px;background:#fff;border:1px solid var(--border);border-radius:12px}
.loc-group{display:flex;flex-direction:column;gap:4px}
.loc-group label{font-size:11px;font-weight:700;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.05em}
.loc-sep{width:1px;height:36px;background:var(--border);flex-shrink:0;align-self:flex-end;margin:0 2px}
.loc-clear{font-size:12px;color:var(--primary);cursor:pointer;font-weight:500;padding:4px 8px;border-radius:6px;border:none;background:none;align-self:flex-end}
.loc-clear:hover{background:var(--muted)}
/* ── Inline cell edit ── */
.btn-pencil{border:none;background:none;cursor:pointer;color:var(--muted-fg);padding:2px 4px;border-radius:4px;opacity:0;vertical-align:middle;font-size:13px;line-height:1;margin-left:3px;transition:opacity .15s}
tr:hover .btn-pencil{opacity:.55}
.btn-pencil:hover{opacity:1;background:var(--muted)}
.cell-in{width:60px;padding:3px 7px;font-size:13px;border:1.5px solid var(--primary);border-radius:6px;outline:none;font-family:monospace}
.edit-acts{display:inline-flex;gap:4px;margin-left:4px;vertical-align:middle}
.edit-acts button{border:none;cursor:pointer;border-radius:5px;padding:2px 8px;font-size:12px;font-weight:700}
.btn-eo{background:#22c55e;color:#fff}
.btn-ex{background:#e2e8f0;color:#475569}

/* KPI cards filtráveis */
.kpi.filterable{cursor:pointer;transition:box-shadow .15s,border-color .15s}
.kpi.filterable:hover{box-shadow:0 0 0 2px var(--primary);border-color:var(--primary)}
.kpi.filterable.active{box-shadow:0 0 0 2px var(--primary);background:color-mix(in srgb,var(--primary) 8%,#fff);border-color:var(--primary)}
.kpi.filterable.active .lbl{color:var(--primary)}
</style>
</head>
<body>
<div id="app">
  <div class="page-head">
    <div><h1>Saldo de Estoque</h1><p>Posi&#231;&#227;o atual por EPI e empresa</p></div>
    <a href="movimentacoes.html" class="btn accent">+ Nova movimentação</a>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="lbl">SKUs</div><div class="val" id="k-skus">—</div></div>
    <div class="kpi"><div class="lbl">Unidades</div><div class="val" id="k-unids">—</div></div>
    <div class="kpi filterable" id="kpi-baixo" onclick="toggleKpiFilter('baixo','kpi-baixo')" title="Filtrar: abaixo do m&#237;nimo"><div class="lbl">Abaixo do m&#237;nimo</div><div class="val" id="k-baixo">—</div></div>
    <div class="kpi filterable" id="kpi-cas"   onclick="toggleKpiFilter('cas','kpi-cas')"   title="Filtrar: CAs vencendo nos pr&#243;ximos 30 dias"><div class="lbl">CAs vencendo (30d)</div><div class="val" id="k-cas">—</div></div>
  </div>

  <!-- Filtro de localização cascata -->
  <div class="loc-bar">
    <div class="loc-group">
      <label>Empresa</label>
      <select class="select" id="f-empresa" style="width:auto;min-width:180px" onchange="onEmpresaChange()">
        <option value="">Todas as empresas</option>
      </select>
    </div>
    <div class="loc-group">
      <label>Unidade</label>
      <select class="select" id="f-unidade" style="width:auto;min-width:160px" onchange="onUnidadeChange()">
        <option value="">Todas as unidades</option>
      </select>
    </div>
    <div class="loc-group">
      <label>Subunidade</label>
      <select class="select" id="f-subunidade" style="width:auto;min-width:160px" onchange="loadEstoque()">
        <option value="">Todas as subunidades</option>
      </select>
    </div>
    <div class="loc-sep"></div>
    <button class="loc-clear" id="btn-clear-loc" style="display:none" onclick="clearLocFiltro()">✕ Limpar local</button>
  </div>

  <!-- Filtros -->
  <div class="filters">
    <input class="input" id="f-busca" type="text" placeholder="Buscar EPI ou CA..." oninput="loadEstoque()" style="width:220px">
    <select class="select" id="f-status" onchange="onStatusChange()" style="width:auto">
      <option value="">Todos os status</option>
      <option value="baixo">Abaixo do m&#237;nimo</option>
      <option value="cas">CAs vencendo (30d)</option>
      <option value="ok">OK (dentro do m&#237;nimo)</option>
      <option value="sem-min">Sem m&#237;nimo definido</option>
    </select>
    <button class="btn outline" onclick="clearFilters()">Limpar</button>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead>
        <tr>
          <th>EPI</th>
          <th style="width:80px">CA</th>
          <th>Empresa</th>
          <th>Unidade</th>
          <th style="width:80px;text-align:right">Qtd</th>
          <th style="width:80px;text-align:right">M&#237;nimo</th>
          <th style="width:110px;text-align:center">Status</th>
        </tr>
      </thead>
      <tbody id="tbody-estoque">
        <tr><td colspan="7" style="text-align:center;color:var(--muted-fg);padding:36px">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script defer src="js/config.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/_layout.js"></script>
<script>
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('authReady', async () => {
  // Carrega empresas, unidades e subunidades das tabelas mestre
  const [re, ru, rs] = await Promise.all([
    fetch('api/movimentacoes.php?action=empresas'),
    fetch('api/movimentacoes.php?action=unidades'),
    fetch('api/movimentacoes.php?action=subunidades'),
  ]);
  window._empresas    = re.ok ? await re.json() : [];
  window._unidades    = ru.ok ? await ru.json() : [];
  window._subunidades = rs.ok ? await rs.json() : [];

  // Popula empresa
  const eSel = document.getElementById('f-empresa');
  window._empresas.forEach(e => {
    const o = document.createElement('option');
    o.value = e.ID_EMPRESA; o.textContent = e.RAZAO_SOCIAL || '(sem nome)';
    eSel.appendChild(o);
  });

  // Se o usuário estiver vinculado a uma localização,
  // pré-seleciona e trava os selects conforme o nível do PERFIL.
  const user = window.currentUser || {};
  const isSuper = user && (user.perfil === 0 || user.super_user === true || user.super_user === 1);
  
  if (!isSuper) {
    // Caso 1: Perfil Empresa (1)
    if (user.perfil === 1 && user.empresa_id) {
       eSel.value = user.empresa_id;
       eSel.disabled = true;
       onEmpresaChange();
    } 
    // Caso 2: Perfil Unidade (2)
    else if (user.perfil === 2 && user.unidade_id) {
       const u = (window._unidades || []).find(x => x.ID_UNIDADE == user.unidade_id);
       if (u) {
          eSel.value = u.EMPRESA_ID || '';
          eSel.disabled = true;
          onEmpresaChange();
          const uSel = document.getElementById('f-unidade');
          uSel.value = user.unidade_id;
          uSel.disabled = true;
          onUnidadeChange();
       }
    }
    // Caso 3: Perfil Subunidade (3)
    else if ((user.perfil === 3 || user.subunidade_id || user.almoxarifado_id)) {
       const subId = user.subunidade_id || user.almoxarifado_id;
       const sub = (window._subunidades || []).find(s => s.ID_SUBUNIDADE == subId);
       if (sub) {
          const uni = (window._unidades || []).find(u => u.ID_UNIDADE == sub.UNIDADE_ID);
          if (uni) {
             eSel.value = uni.EMPRESA_ID || '';
             eSel.disabled = true;
             onEmpresaChange();
             const uSel = document.getElementById('f-unidade');
             uSel.value = uni.ID_UNIDADE;
             uSel.disabled = true;
             onUnidadeChange();
             const sSel = document.getElementById('f-subunidade');
             sSel.value = subId;
             sSel.disabled = true;
          }
       }
    }
    const btn = document.getElementById('btn-clear-loc'); if (btn) btn.style.display = 'none';
  }

  await loadKpis();
});

function onEmpresaChange(){
  const eId = Number(document.getElementById('f-empresa').value) || null;
  const uSel = document.getElementById('f-unidade');
  const sSel = document.getElementById('f-subunidade');
  uSel.innerHTML = '<option value="">Todas as unidades</option>';
  sSel.innerHTML = '<option value="">Todas as subunidades</option>';
  document.getElementById('btn-clear-loc').style.display = eId ? '' : 'none';
  const unids = eId
    ? (window._unidades || []).filter(u => Number(u.EMPRESA_ID) === eId)
    : (window._unidades || []);
  unids.forEach(u => {
    const o = document.createElement('option');
    o.value = u.ID_UNIDADE; o.textContent = u.NOME || '(sem nome)';
    uSel.appendChild(o);
  });
  loadEstoque();
}

function onUnidadeChange(){
  const uId = Number(document.getElementById('f-unidade').value) || null;
  const sSel = document.getElementById('f-subunidade');
  sSel.innerHTML = '<option value="">Todas as subunidades</option>';
  const subs = uId
    ? (window._subunidades || []).filter(s => Number(s.UNIDADE_ID) === uId)
    : (window._subunidades || []);
  subs.forEach(s => {
    const o = document.createElement('option');
    o.value = s.ID_SUBUNIDADE; o.textContent = s.NOME || '(sem nome)';
    sSel.appendChild(o);
  });
  loadEstoque();
}

function clearLocFiltro(){
  document.getElementById('f-empresa').value = '';
  document.getElementById('f-unidade').innerHTML  = '<option value="">Todas as unidades</option>';
  document.getElementById('f-subunidade').innerHTML = '<option value="">Todas as subunidades</option>';
  document.getElementById('f-unidade').innerHTML  = '<option value="">Todas as unidades</option>';
  document.getElementById('f-subunidade').innerHTML = '<option value="">Todas as subunidades</option>';
  document.getElementById('btn-clear-loc').style.display = 'none';
  loadEstoque();
}

async function loadKpis() {
  const r = await fetch('api/estoque.php?action=kpis');
  if (!r.ok) return;
  const d = await r.json();
  document.getElementById('k-skus').textContent  = (d.TOTAL_SKUS   ?? 0).toLocaleString('pt-BR');
  document.getElementById('k-unids').textContent = (d.TOTAL_UNIDADES ?? 0).toLocaleString('pt-BR');
  document.getElementById('k-baixo').textContent = d.ABAIXO_MINIMO ?? '—';
  document.getElementById('k-cas').textContent   = d.CAS_VENCENDO  ?? '—';
}

async function loadEstoque() {
  const busca      = document.getElementById('f-busca').value;
  const status     = document.getElementById('f-status').value;
  const empresaId  = document.getElementById('f-empresa').value;
  const unidadeId  = document.getElementById('f-unidade').value;
  const subId      = document.getElementById('f-subunidade').value;
  const qs = new URLSearchParams({ action: 'list' });
  if (busca)     qs.append('busca',        busca);
  if (status)    qs.append('status',       status);
  if (empresaId) qs.append('empresa_id',   empresaId);
  if (unidadeId) qs.append('unidade_id',   unidadeId);
  if (subId)     qs.append('subunidade_id', subId);
  const r = await fetch('api/estoque.php?' + qs);
  const rows = r.ok ? await r.json() : [];
  renderEstoque(rows);
}

function renderEstoque(rows) {
  const tb = document.getElementById('tbody-estoque');
  if (!rows.length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted-fg);padding:36px">Nenhum registro encontrado.</td></tr>';
    return;
  }
  tb.innerHTML = rows.map(r => {
    let cls, lbl;
    if (r.ESTOQUE_MINIMO <= 0)                { cls = 'sem-min'; lbl = 'Sem m\u00ednimo'; }
    else if (r.QUANTIDADE < r.ESTOQUE_MINIMO) { cls = 'baixo';   lbl = 'Baixo'; }
    else                                       { cls = 'ok';      lbl = 'OK'; }

    const local = [r.UNIDADE_NOME, r.SUBUNIDADE_NOME].filter(Boolean).join(' \u203a ') || '\u2014';
    return `<tr>
      <td><strong>${esc(r.DESCRICAO ?? '—')}</strong></td>
      <td style="font-size:13px;color:var(--muted-fg)">${esc(r.CA ?? '—')}</td>
      <td style="font-size:13px">${esc(r.EMPRESA_NOME ?? '—')}</td>
      <td style="font-size:13px;color:var(--muted-fg)">${esc(local)}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:600">${r.QUANTIDADE}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums;color:var(--muted-fg)">${r.ID_ESTOQUE ? `<span>${r.ESTOQUE_MINIMO > 0 ? r.ESTOQUE_MINIMO : '—'}</span><button class="btn-pencil" onclick="startEditMin(this,${r.ID_ESTOQUE},${r.ESTOQUE_MINIMO})" title="Editar mínimo">✏</button>` : (r.ESTOQUE_MINIMO > 0 ? r.ESTOQUE_MINIMO : '—')}</td>
      <td style="text-align:center"><span class="badge ${cls}">${lbl}</span></td>
    </tr>`;
  }).join('');
}

function onStatusChange() {
  // Sincroniza estado ativo dos KPI cards com o select
  const v = document.getElementById('f-status').value;
  document.getElementById('kpi-baixo').classList.toggle('active', v === 'baixo');
  document.getElementById('kpi-cas').classList.toggle('active',   v === 'cas');
  loadEstoque();
}

function toggleKpiFilter(status, kpiId) {
  const sel = document.getElementById('f-status');
  // Toggle: se já está ativo, limpa; senão aplica
  const next = sel.value === status ? '' : status;
  sel.value = next;
  onStatusChange();
  if (next) document.getElementById('tbody-estoque').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearFilters() {
  document.getElementById('f-busca').value  = '';
  document.getElementById('f-status').value = '';
  onStatusChange();
}

function startEditMin(btn, idEstoque, currentMin) {
  const td = btn.closest('td');
  td.innerHTML = `<input class="cell-in" type="number" min="0" value="${currentMin}" id="in-min-${idEstoque}">`+
                 `<span class="edit-acts">`+
                 `<button class="btn-eo" onclick="saveMin(${idEstoque})">✓</button>`+
                 `<button class="btn-ex" onclick="loadEstoque()">✕</button>`+
                 `</span>`;
  const inp = document.getElementById(`in-min-${idEstoque}`);
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => {
    if(e.key==='Enter')  saveMin(idEstoque);
    if(e.key==='Escape') loadEstoque();
  });
}

async function saveMin(idEstoque) {
  const inp = document.getElementById(`in-min-${idEstoque}`);
  if(!inp) return;
  const minimo = parseInt(inp.value) || 0;
  try {
    const res = await fetch('api/estoque.php?action=minimo', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id_estoque: idEstoque, minimo})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Erro ao salvar');
    toast('Mínimo atualizado!');
    await Promise.all([loadEstoque(), loadKpis()]);
  } catch(err) {
    toast(err.message, 'error');
    loadEstoque();
  }
}
</script>
</body>
</html>
