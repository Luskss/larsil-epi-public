<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Funcionários — EPI Manager</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <div class="page-head">
    <div><h1>Funcionários</h1><p>Consulta de colaboradores (dbo.COLABORADORES)</p></div>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <input class="input" id="search" placeholder="Nome, CPF ou matrícula…" style="width:200px" oninput="applyFilters()">
      <select class="select" id="f-empresa" style="width:auto" onchange="applyFilters()"><option value="">Todas as empresas</option></select>
      <select class="select" id="f-funcao"  style="width:auto" onchange="applyFilters()"><option value="">Todas as funções</option></select>
      <select class="select" id="f-sit"     style="width:auto" onchange="applyFilters()"><option value="">Qualquer situação</option></select>
    </div>
  </div>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th class="sh" data-col="NOME"      onclick="toggleSort('NOME')">Nome <span class="si">↕</span></th>
          <th class="sh" data-col="CPF"       onclick="toggleSort('CPF')">CPF <span class="si">↕</span></th>
          <th class="sh" data-col="EMPRESA"   onclick="toggleSort('EMPRESA')">Empresa <span class="si">↕</span></th>
          <th class="sh" data-col="FUNCAO"    onclick="toggleSort('FUNCAO')">Função <span class="si">↕</span></th>
          <th class="sh" data-col="EQUIPE"    onclick="toggleSort('EQUIPE')">Equipe <span class="si">↕</span></th>
          <th class="sh" data-col="MATRICULA" onclick="toggleSort('MATRICULA')">Matrícula <span class="si">↕</span></th>
          <th>Situação</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="7" style="text-align:center;color:var(--muted-fg);padding:32px">Carregando…</td></tr></tbody>
    </table>
  </div>
  <style>
    th.sh{cursor:pointer;user-select:none}
    th.sh:hover{background:color-mix(in oklab,var(--muted) 80%,transparent)}
    th.sh .si{opacity:.35;font-size:.85em;margin-left:2px}
    th.s-asc .si,th.s-desc .si{opacity:1;color:var(--primary)}
    th.s-asc,th.s-desc{color:var(--primary)}
  </style>
</div>
<script defer src="js/config.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/_layout.js"></script>
<script>
  let allRows=[], sortCol=null, sortDir=0;
  const SIT_MAP = { '1':'Ativo', '0':'Inativo', '2':'Afastado', '3':'Demitido' };
  function sit_lbl(v) { return SIT_MAP[String(v ?? '')] ?? (v ? String(v) : '—'); }
  function sit_cls(v)  { const s = String(v ?? ''); return s==='1'?'green': s==='0'?'red': ''; }
  document.addEventListener('authReady', async function(){
    const res = await fetch('api/colaboradores.php');
    allRows = res.ok ? await res.json() : [];
    const unique = k=>[...new Set(allRows.map(r=>r[k]).filter(Boolean))].sort();
    const fill = (id,vals)=>{ const s=document.getElementById(id),f=s.options[0]; s.innerHTML=''; s.appendChild(f); vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);}); };
    fill('f-empresa', unique('EMPRESA'));
    fill('f-funcao',  unique('FUNCAO'));
    fill('f-sit',     unique('SITUACAO'));
    // Troca valores numéricos no select situação por labels legíveis
    const sitSel = document.getElementById('f-sit');
    sitSel.querySelectorAll('option').forEach(o => {
      if (o.value !== '') o.textContent = sit_lbl(o.value);
    });
    applyFilters();
  });

  function applyFilters(){
    const q=document.getElementById('search').value.toLowerCase();
    const emp=document.getElementById('f-empresa').value;
    const fun=document.getElementById('f-funcao').value;
    const sit=document.getElementById('f-sit').value;
    let rows=allRows.filter(r=>{
      if(q&&!(r.NOME||'').toLowerCase().includes(q)&&!(r.CPF||'').includes(q)&&!(r.MATRICULA||'').toLowerCase().includes(q)) return false;
      if(emp&&r.EMPRESA!==emp) return false;
      if(fun&&r.FUNCAO!==fun) return false;
      if(sit&&r.SITUACAO!==sit) return false;
      return true;
    });
    if(sortCol) rows=[...rows].sort((a,b)=>String(a[sortCol]??'').localeCompare(String(b[sortCol]??''),'pt-BR',{numeric:true})*sortDir);
    render(rows);
  }

  // Ciclo: ↕ → ↑ → ↓ → ↕
  function toggleSort(col){
    if(sortCol!==col){sortCol=col;sortDir=1;}
    else if(sortDir===1){sortDir=-1;}
    else{sortCol=null;sortDir=0;}
    document.querySelectorAll('th.sh').forEach(th=>{th.classList.remove('s-asc','s-desc');th.querySelector('.si').textContent='↕';});
    if(sortCol){const a=document.querySelector(`th[data-col="${sortCol}"]`);if(a){a.classList.add(sortDir===1?'s-asc':'s-desc');a.querySelector('.si').textContent=sortDir===1?'↑':'↓';}}
    applyFilters();
  }

  function render(rows){
    const tbody=document.getElementById('tbody');
    if(!rows.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--muted-fg);padding:32px">Nenhum colaborador encontrado.</td></tr>';return;}
    tbody.innerHTML=rows.map(r=>`
      <tr>
        <td><b>${r.NOME||'—'}</b></td>
        <td style="font-family:monospace">${r.CPF||'—'}</td>
        <td>${r.EMPRESA||'—'}</td>
        <td>${r.FUNCAO||'—'}</td>
        <td>${r.EQUIPE||'—'}</td>
        <td style="font-family:monospace">${r.MATRICULA||'—'}</td>
        <td><span class="badge ${sit_cls(r.SITUACAO)}">${sit_lbl(r.SITUACAO)}</span></td>
      </tr>`).join('');
  }
</script>
</body>
</html>
