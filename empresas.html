<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Empresas — EPI Manager</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  /* ── Modal overlay ── */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
  .modal-bg.hidden{display:none}
  .modal{background:#fff;border-radius:14px;padding:28px 28px 24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal h2{margin:0 0 18px;font-size:17px;font-weight:600}
  .modal .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .modal .field label{font-size:12px;font-weight:500;color:var(--muted-fg)}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

  /* ── Table action icons ── */
  .icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;color:var(--muted-fg);transition:color .15s,background .15s;line-height:1}
  .icon-btn:hover{background:var(--accent);color:var(--primary)}
  .icon-btn.del:hover{background:#fee2e2;color:#dc2626}
</style>
</head>
<body>
<div id="app">
  <div class="page-head">
    <div>
      <h1>Empresas</h1>
      <p>Matriz e filiais do grupo</p>
    </div>
    <button class="btn accent" onclick="openModal()">+ Nova empresa</button>
  </div>

  <div class="card">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
      <input class="input" id="search" placeholder="🔍  Buscar por razão social ou CNPJ…" style="max-width:400px" oninput="applyFilter()">
    </div>
    <table>
      <thead>
        <tr>
          <th>Razão social</th>
          <th style="width:160px">CNPJ</th>
          <th style="width:260px">Endereço</th>
          <th style="width:80px;text-align:right">Ações</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4" style="text-align:center;color:var(--muted-fg);padding:32px">Carregando…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── Modal: criar / editar ── -->
<div class="modal-bg hidden" id="modal-bg" onclick="closeBgClick(event)">
  <div class="modal">
    <h2 id="modal-title">Nova empresa</h2>
    <input type="hidden" id="m-id">

    <div class="field">
      <label>Razão social <span style="color:#dc2626">*</span></label>
      <input class="input" id="m-razao" placeholder="Nome da empresa" autocomplete="off">
    </div>
    <div class="field">
      <label>CNPJ</label>
      <input class="input" id="m-cnpj" placeholder="00.000.000/0000-00" maxlength="18" oninput="maskCnpj(this)">
    </div>
    <div class="field">
      <label>Endereço</label>
      <input class="input" id="m-endereco" placeholder="Rua, cidade, estado…">
    </div>

    <div class="modal-foot">
      <button class="btn outline" onclick="closeModal()">Cancelar</button>
      <button class="btn accent" id="modal-save-btn" onclick="saveEmpresa()">Salvar</button>
    </div>
  </div>
</div>

<script defer src="js/config.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/_layout.js"></script>
<script>
  let allRows = [];

  document.addEventListener('authReady', async function(){
    await loadEmpresas();
  });

  async function loadEmpresas(){
    const res = await fetch('api/empresas.php');
    allRows = res.ok ? await res.json() : [];
    applyFilter();
  }

  function applyFilter(){
    const q = document.getElementById('search').value.toLowerCase();
    const rows = q
      ? allRows.filter(r =>
          r.RAZAO_SOCIAL?.toLowerCase().includes(q) ||
          (r.CNPJ||'').toLowerCase().includes(q))
      : allRows;
    render(rows);
  }

  function render(rows){
    const tbody = document.getElementById('tbody');
    if(!rows.length){
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted-fg);padding:32px">Nenhuma empresa encontrada.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${r.RAZAO_SOCIAL}</td>
        <td style="font-family:monospace">${r.CNPJ || '—'}</td>
        <td>${r.ENDERECO || '—'}</td>
        <td style="text-align:right;white-space:nowrap">
          <button class="icon-btn" title="Editar" onclick='editEmpresa(${JSON.stringify(r)})'>
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="icon-btn del" title="Excluir" onclick="deleteEmpresa(${r.ID_EMPRESA}, '${r.RAZAO_SOCIAL.replace(/'/g,"\\'")}')">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </td>
      </tr>`).join('');
  }

  // ── Modal ──
  function openModal(){
    document.getElementById('modal-title').textContent = 'Nova empresa';
    document.getElementById('m-id').value = '';
    document.getElementById('m-razao').value = '';
    document.getElementById('m-cnpj').value = '';
    document.getElementById('m-endereco').value = '';
    document.getElementById('modal-bg').classList.remove('hidden');
    document.getElementById('m-razao').focus();
  }

  function editEmpresa(r){
    document.getElementById('modal-title').textContent = 'Editar empresa';
    document.getElementById('m-id').value      = r.ID_EMPRESA;
    document.getElementById('m-razao').value   = r.RAZAO_SOCIAL || '';
    document.getElementById('m-cnpj').value    = r.CNPJ || '';
    document.getElementById('m-endereco').value= r.ENDERECO || '';
    document.getElementById('modal-bg').classList.remove('hidden');
    document.getElementById('m-razao').focus();
  }

  function closeModal(){
    document.getElementById('modal-bg').classList.add('hidden');
  }

  function closeBgClick(e){
    if(e.target === document.getElementById('modal-bg')) closeModal();
  }

  async function saveEmpresa(){
    const razao = document.getElementById('m-razao').value.trim();
    if(!razao){ alert('Razão social é obrigatória.'); return; }

    const id      = document.getElementById('m-id').value;
    const cnpj    = document.getElementById('m-cnpj').value.trim();
    const endereco= document.getElementById('m-endereco').value.trim();
    const btn     = document.getElementById('modal-save-btn');

    btn.disabled = true; btn.textContent = 'Salvando…';

    try {
      const res = await fetch('api/empresas.php', {
        method: id ? 'PUT' : 'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ id: id ? +id : undefined, razao_social: razao, cnpj, endereco })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Erro ao salvar');
      closeModal();
      await loadEmpresas();
      toast(id ? 'Empresa atualizada.' : 'Empresa criada com sucesso.');
    } catch(err){
      alert(err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Salvar';
    }
  }

  async function deleteEmpresa(id, nome){
    if(!confirm(`Excluir "${nome}"? Esta ação não pode ser desfeita.`)) return;
    try {
      const res = await fetch('api/empresas.php', {
        method: 'DELETE',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ id })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Erro ao excluir');
      await loadEmpresas();
      toast('Empresa excluída.');
    } catch(err){
      alert(err.message);
    }
  }

  // ── Máscara CNPJ ──
  function maskCnpj(el){
    let v = el.value.replace(/\D/g,'').slice(0,14);
    if(v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/,'$1.$2.$3/$4-$5');
    else if(v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4})/,'$1.$2.$3/$4');
    else if(v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d{0,3})/,'$1.$2.$3');
    else if(v.length > 2) v = v.replace(/^(\d{2})(\d{0,3})/,'$1.$2');
    el.value = v;
  }
</script>
</body>
</html>
