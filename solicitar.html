<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicitar EPI — EPI Manager</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <div class="page-head">
    <div><h1>Solicitar EPI</h1><p>Crie uma nova solicitação para sua equipe</p></div>
  </div>
  <div class="grid cols-2">
    <div class="card">
      <div class="card-head"><h3>Nova solicitação</h3></div>
      <div class="card-body">
        <form id="frm" style="display:grid;gap:14px">
          <div class="field">
            <label>Colaborador</label>
            <select class="select" id="f-colab" required><option value="">Carregando…</option></select>
          </div>
          <div class="field">
            <label>EPI</label>
            <select class="select" id="f-epi" required><option value="">Carregando…</option></select>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="field"><label>Quantidade</label><input class="input" id="f-qtd" type="number" value="1" min="1" required></div>
            <div class="field">
              <label>Prioridade</label>
              <select class="select" id="f-prio"><option value="Normal">Normal</option><option value="Urgente">Urgente</option></select>
            </div>
          </div>
          <div class="field"><label>Observação</label><textarea class="input" id="f-obs" style="height:76px;padding:8px 12px" placeholder="Opcional…"></textarea></div>
          <button class="btn" type="submit" id="btn-env">Enviar solicitação</button>
        </form>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Suas solicitações recentes</h3></div>
      <div class="card-body" style="padding:0">
        <table>
          <thead><tr><th>#</th><th>Data</th><th>Colaborador</th><th>Itens</th><th>Status</th></tr></thead>
          <tbody id="lista"><tr><td colspan="5" style="text-align:center;color:var(--muted-fg);padding:24px">Carregando…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script defer src="js/config.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/_layout.js"></script>
<script>
  let colaboradores=[], epis=[], me=null;
  const SL={0:'amber',1:'blue',2:'green',3:'red'};
  const ST={0:'Pendente',1:'Em separação',2:'Despachada',3:'Rejeitada'};

  document.addEventListener('authReady', async function(e){
    me = e.detail;
    const [rC,rE] = await Promise.all([fetch('api/colaboradores.php'), fetch('api/epis.php')]);
    colaboradores = rC.ok ? await rC.json() : [];
    epis          = rE.ok ? await rE.json() : [];

    const selC = document.getElementById('f-colab');
    selC.innerHTML = '<option value="">Selecione o colaborador…</option>' +
      colaboradores.map(c=>`<option value="${c.ID}">${c.NOME} — ${c.EMPRESA}</option>`).join('');

    const selE = document.getElementById('f-epi');
    selE.innerHTML = '<option value="">Selecione o EPI…</option>' +
      epis.filter(e=>e.ATIVO).map(e=>`<option value="${e.ID}">${e.DESCRICAO} (CA ${e.CA})</option>`).join('');

    await loadMinhas();
  });

  document.getElementById('frm').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn     = document.getElementById('btn-env');
    const colabId = parseInt(document.getElementById('f-colab').value);
    const epiId   = parseInt(document.getElementById('f-epi').value);
    const qtd     = parseInt(document.getElementById('f-qtd').value);
    if(!colabId||!epiId||!qtd){ toast('Preencha todos os campos.','error'); return; }
    const colab = colaboradores.find(c=>c.ID===colabId);
    btn.disabled=true; btn.textContent='Enviando…';
    try{
      const res = await fetch('api/solicitacoes.php',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          lider:          me?.nome||me?.email||'',
          colaborador_id: colabId,
          prioridade:     document.getElementById('f-prio').value,
          observacao:     document.getElementById('f-obs').value.trim()||null,
          equipe:         colab?.EQUIPE||null,
          itens:          [{epi_id:epiId, quantidade:qtd}]
        })
      });
      const d = await res.json();
      if(d.success){ toast('Solicitação enviada!'); this.reset(); await loadMinhas(); }
      else toast(d.error||'Erro ao enviar.','error');
    }catch{ toast('Erro de conexão.','error'); }
    btn.disabled=false; btn.textContent='Enviar solicitação';
  });

  async function loadMinhas(){
    const res   = await fetch('api/solicitacoes.php?tipo=minhas');
    const rows  = res.ok ? await res.json() : [];
    const tbody = document.getElementById('lista');
    if(!rows.length){ tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--muted-fg);padding:24px">Nenhuma solicitação ainda.</td></tr>'; return; }
    tbody.innerHTML = rows.map(s=>`
      <tr>
        <td style="font-family:monospace">#${s.ID_SOLICITACAO}</td>
        <td>${formatDate(s.DATA_SOLICITACAO)}</td>
        <td>${s.COLABORADOR_NOME||'—'}</td>
        <td style="text-align:center">${s.itens?.length||0}</td>
        <td><span class="badge ${SL[s.STATUS]||''}">${ST[s.STATUS]||s.STATUS}</span></td>
      </tr>`).join('');
  }
</script>
</body>
</html>
