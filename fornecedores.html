<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fornecedores — EPI Manager</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
  .modal-bg.hidden{display:none}
  .modal{background:#fff;border-radius:14px;padding:28px 28px 24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal h2{margin:0 0 18px;font-size:17px;font-weight:600}
  .modal .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .modal .field label{font-size:12px;font-weight:500;color:var(--muted-fg)}
  .modal .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
  th.sortable:hover{background:rgba(0,0,0,.03)}
  th.sort-asc,th.sort-desc{color:var(--primary)}
  .icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;color:var(--muted-fg);transition:color .15s,background .15s;line-height:1}
  .icon-btn:hover{background:var(--accent);color:var(--primary)}
  .icon-btn.del:hover{background:#fee2e2;color:#dc2626}
</style>
</head>
<body>
<div id="app">
  <div class="page-head">
    <div>
      <h1>Fornecedores</h1>
      <p>Cadastro de fornecedores de EPIs</p>
    </div>
    <button class="btn accent" onclick="openModal()">+ Novo fornecedor</button>
  </div>

  <div class="card">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input class="input" id="search" placeholder="Buscar por nome ou CNPJ..." style="max-width:360px;flex:1" oninput="applyFilters()">
      <select class="select" id="f-ativo" style="width:auto" onchange="applyFilters()">
        <option value="">Todos</option>
        <option value="1">Ativo</option>
        <option value="0">Inativo</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th class="sortable" data-col="NOME"     onclick="toggleSort('NOME')">Nome <span class="si">&#8597;</span></th>
          <th class="sortable" data-col="CNPJ"     onclick="toggleSort('CNPJ')" style="width:155px">CNPJ <span class="si">&#8597;</span></th>
          <th class="sortable" data-col="TELEFONE" onclick="toggleSort('TELEFONE')" style="width:135px">Telefone <span class="si">&#8597;</span></th>
          <th class="sortable" data-col="EMAIL"    onclick="toggleSort('EMAIL')">E-mail <span class="si">&#8597;</span></th>
          <th style="width:80px">Status</th>
          <th style="width:80px;text-align:right">Ações</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" style="text-align:center;color:var(--muted-fg);padding:32px">Carregando…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-bg hidden" id="modal-bg" onclick="closeBgClick(event)">
  <div class="modal">
    <h2 id="modal-title">Novo fornecedor</h2>
    <input type="hidden" id="m-id">
    <div class="grid2">
      <div class="field" style="grid-column:1/-1">
        <label>Nome *</label>
        <input class="input" id="m-nome" placeholder="Razao social / nome" autocomplete="off">
      </div>
      <div class="field">
        <label>CNPJ</label>
        <input class="input" id="m-cnpj" placeholder="00.000.000/0000-00" maxlength="18">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input class="input" id="m-tel" placeholder="(00) 00000-0000" maxlength="16">
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>E-mail</label>
        <input class="input" id="m-email" type="email" placeholder="contato@empresa.com">
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Contato (pessoa responsável)</label>
        <input class="input" id="m-contato" placeholder="Nome do contato">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn outline" onclick="closeModal()">Cancelar</button>
      <button class="btn accent" id="modal-save-btn" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script defer src="js/config.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/_layout.js"></script>
<script>
  let allRows = [], sortCol = null, sortDir = 0;

  document.addEventListener('authReady', async function(){
    maskCNPJ(document.getElementById('m-cnpj'));
    maskTel(document.getElementById('m-tel'));
    await loadData();
  });

  async function loadData(){
    const res = await fetch('api/fornecedores.php');
    allRows = res.ok ? await res.json() : [];
    applyFilters();
  }

  function applyFilters(){
    const q     = document.getElementById('search').value.toLowerCase();
    const ativo = document.getElementById('f-ativo').value;
    let rows = allRows.filter(r => {
      if (q && !(r.NOME||'').toLowerCase().includes(q) && !(r.CNPJ||'').includes(q)) return false;
      if (ativo !== '' && String(r.IS_ATIVO ? 1 : 0) !== ativo) return false;
      return true;
    });
    if (sortCol) {
      rows = [...rows].sort((a,b) =>
        String(a[sortCol]??'').localeCompare(String(b[sortCol]??''), 'pt-BR', {numeric:true}) * sortDir
      );
    }
    render(rows);
  }

  function toggleSort(col){
    if (sortCol !== col)    { sortCol = col; sortDir = 1; }
    else if (sortDir === 1) { sortDir = -1; }
    else                    { sortCol = null; sortDir = 0; }
    document.querySelectorAll('th.sortable').forEach(th => {
      th.classList.remove('sort-asc','sort-desc');
      th.querySelector('.si').textContent = String.fromCharCode(8597);
    });
    if (sortCol) {
      const th = document.querySelector('th[data-col="'+sortCol+'"]');
      if (th) {
        th.classList.add(sortDir===1?'sort-asc':'sort-desc');
        th.querySelector('.si').textContent = sortDir===1 ? String.fromCharCode(8593) : String.fromCharCode(8595);
      }
    }
    applyFilters();
  }

  function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function render(rows){
    const tbody = document.getElementById('tbody');
    if (!rows.length){
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted-fg);padding:32px">Nenhum fornecedor encontrado.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(f => '<tr>'
      +'<td><b>'+esc(f.NOME)+'</b></td>'
      +'<td style="font-family:monospace">'+formatCNPJ(f.CNPJ)+'</td>'
      +'<td>'+esc(f.TELEFONE||'--')+'</td>'
      +'<td>'+esc(f.EMAIL||'--')+'</td>'
      +'<td><span class="badge '+(f.IS_ATIVO?'green':'')+'">'+( f.IS_ATIVO?'Ativo':'Inativo')+'</span></td>'
      +'<td style="text-align:right;white-space:nowrap">'
        +'<button class="icon-btn" title="Editar" onclick=\'editForn('+JSON.stringify(f)+')\'>'
        +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
        +'</button>'
        +'<button class="icon-btn del" title="Excluir" onclick="excluir('+f.ID_FORNECEDOR+',\''+esc(f.NOME)+'\')">'
        +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>'
        +'</button>'
      +'</td>'
      +'</tr>'
    ).join('');
  }

  function openModal(){
    document.getElementById('modal-title').textContent = 'Novo fornecedor';
    ['m-id','m-nome','m-cnpj','m-tel','m-email','m-contato'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('modal-bg').classList.remove('hidden');
    document.getElementById('m-nome').focus();
  }

  function editForn(f){
    document.getElementById('modal-title').textContent = 'Editar fornecedor';
    document.getElementById('m-id').value      = f.ID_FORNECEDOR;
    document.getElementById('m-nome').value    = f.NOME  || '';
    document.getElementById('m-cnpj').value    = f.CNPJ  || '';
    document.getElementById('m-tel').value     = f.TELEFONE || '';
    document.getElementById('m-email').value   = f.EMAIL || '';
    document.getElementById('m-contato').value = f.CONTATO || '';
    document.getElementById('modal-bg').classList.remove('hidden');
    document.getElementById('m-nome').focus();
  }

  function closeModal(){ document.getElementById('modal-bg').classList.add('hidden'); }
  function closeBgClick(e){ if(e.target===document.getElementById('modal-bg')) closeModal(); }

  async function salvar(){
    const nome = document.getElementById('m-nome').value.trim();
    if (!nome){ toast('Nome obrigatorio','Nome e obrigatorio','warning'); return; }
    const id  = document.getElementById('m-id').value;
    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true; btn.textContent = 'Salvando...';
    try {
      const payload = {
        nome,
        cnpj:     document.getElementById('m-cnpj').value.trim() || null,
        telefone: document.getElementById('m-tel').value.trim()  || null,
        email:    document.getElementById('m-email').value.trim()|| null,
        contato:  document.getElementById('m-contato').value.trim(),
      };
      if (id) payload.id = +id;
      const res  = await fetch('api/fornecedores.php', {
        method:  id ? 'PUT' : 'POST',
        headers: {'Content-Type':'application/json'},
        body:    JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Falha ao salvar');
      closeModal();
      toast(id ? 'Fornecedor atualizado.' : 'Fornecedor criado com sucesso.', '', 'success');
      await loadData();
    } catch(err){
      toast('Erro', err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Salvar';
    }
  }

  async function excluir(id, nome){
    if (!confirm('Excluir "'+nome+'"? Esta acao nao pode ser desfeita.')) return;
    try {
      const res  = await fetch('api/fornecedores.php', {
        method:  'DELETE',
        headers: {'Content-Type':'application/json'},
        body:    JSON.stringify({id}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Falha ao excluir');
      toast('Fornecedor excluido.', '', 'success');
      await loadData();
    } catch(err){
      toast('Erro', err.message, 'error');
    }
  }

  function maskTel(el){
    el.addEventListener('input', function(){
      let v = this.value.replace(/\D/g,'').slice(0,11);
      if(v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})$/,'($1) $2-$3');
      else if(v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
      else if(v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})/,'($1) $2');
      else if(v.length > 0) v = v.replace(/^(\d{0,2})/,'($1');
      this.value = v;
    });
  }
</script>
</body>
</html>
