<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Documentos Emitidos — EPI Manager</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border)}
.tab-btn{padding:10px 22px;background:none;border:none;cursor:pointer;font-size:14px;
  font-weight:600;color:var(--muted-fg);border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:color .15s,border-color .15s}
.tab-btn.active{color:oklch(0.42 0.10 150);border-bottom-color:oklch(0.42 0.10 150)}
.tab-btn:hover:not(.active){color:var(--fg)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted-fg)}
.empty-icon{font-size:32px;margin-bottom:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge.signed{background:#dcfce7;color:#166534}
.badge.pending{background:#fef9c3;color:#854d0e}
.badge.nota{background:#dbeafe;color:#1e40af}
.btn-disabled{display:inline-block;padding:5px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-weight:600;color:#9ca3af;background:#f3f4f6;cursor:not-allowed;text-decoration:none}
</style>
</head>
<body>
<div id="app">
  <div class="page-head">
    <div>
      <h1>Documentos Emitidos</h1>
      <p>Termos de EPI e notas de transporte</p>
    </div>
    <button class="btn" onclick="loadAll()">&#8635; Atualizar</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-termos"  onclick="switchTab('termos')">&#128203; Termos de EPI</button>
    <button class="tab-btn"        id="tab-notas"   onclick="switchTab('notas')">&#128666; Notas de Transporte</button>
    <button class="tab-btn"        id="tab-devolucoes" onclick="switchTab('devolucoes')">&#8617; Devolu&#231;&#245;es</button>
  </div>

  <div class="tab-panel active" id="panel-termos">
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead>
          <tr><th>N&#186;</th><th>Data</th><th>Colaborador</th><th>Empresa</th><th>Itens</th><th>Status</th><th>Ver / PDF</th><th>Assinar</th><th>PDF Assinado</th></tr>
        </thead>
        <tbody id="tbody-termos">
          <tr><td colspan="9"><div class="empty-state"><div class="empty-icon">&#9203;</div>Carregando...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="tab-panel" id="panel-devolucoes">
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead>
          <tr><th>N&#186;</th><th>Data</th><th>Colaborador</th><th>Empresa</th><th>Itens</th><th>Ver / PDF</th><th>PDF Assinado</th></tr>
        </thead>
        <tbody id="tbody-devolucoes">
          <tr><td colspan="7"><div class="empty-state"><div class="empty-icon">&#9203;</div>Carregando...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="tab-panel" id="panel-notas">
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead>
          <tr><th>N&#186;</th><th>Data</th><th>Transportador</th><th>Rota</th><th>Itens</th><th>Ver / PDF</th><th>PDF Assinado</th></tr>
        </thead>
        <tbody id="tbody-notas">
          <tr><td colspan="7"><div class="empty-state"><div class="empty-icon">&#9203;</div>Carregando...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script defer src="js/config.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/_layout.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'   + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function fmtDate(iso) {
  if (!iso) return '&#8212;';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'});
}
function pad(n, s) { return String(n).padStart(s, '0'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

async function loadTermos() {
  const tbody = document.getElementById('tbody-termos');
  try {
    const r = await fetch('api/termos.php?action=list');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (!Array.isArray(data) || !data.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">&#128203;</div>Nenhum termo emitido ainda.</div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(t => {
      const signed = !!t.DATA_ASSINATURA;
      const badge  = signed
        ? '<span class="badge signed">Assinado</span>'
        : '<span class="badge pending">Pendente</span>';
      const qtd = Number(t.QTD_ITENS) || 0;
      const assinarBtn = (!signed && t.CAMINHO_PRE)
        ? `<a href="${t.CAMINHO_PRE}" target="_blank" class="btn sm" style="text-decoration:none">&#9997;&#65039; Assinar</a>`
        : `<span class="btn-disabled">&#9997;&#65039; Assinar</span>`;
      const signedBtn = t.CAMINHO_POS
        ? `<a href="${t.CAMINHO_POS}" target="_blank" class="btn sm" style="text-decoration:none">&#128196; Ver Assinado</a>`
        : signed
          ? `<a href="api/termo-print.php?id=${t.ID_TERMO}" target="_blank" class="btn sm" style="text-decoration:none">&#128196; Ver Assinado</a>`
          : `<span class="btn-disabled">&#128196; Ver Assinado</span>`;
      return `<tr>
        <td><span class="mono">#${pad(t.ID_TERMO,6)}</span></td>
        <td>${fmtDate(t.DATA_CRIACAO)}</td>
        <td>${esc(t.COLABORADOR_NOME)}</td>
        <td>${esc(t.EMPRESA)}</td>
        <td><span class="badge" style="background:var(--muted-bg)">${qtd} ${qtd===1?'item':'itens'}</span></td>
        <td>${badge}</td>
        <td><a href="api/termo-print.php?id=${t.ID_TERMO}" target="_blank" class="btn sm outline" style="text-decoration:none">Ver / PDF</a></td>
        <td>${assinarBtn}</td>
        <td>${signedBtn}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">&#10060;</div>Erro: ${esc(e.message)}</div></td></tr>`;
  }
}

async function loadDevolucoes() {
  const tbody = document.getElementById('tbody-devolucoes');
  try {
    const r = await fetch('api/movimentacoes.php?action=list&tipo=Devolu%C3%A7%C3%A3o');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (!Array.isArray(data) || !data.length) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">&#8617;</div>Nenhuma devolução registrada ainda.</div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(d => {
      const qtd = Number(d.QTD_ITENS) || 0;
      const empresa = esc(d.COLABORADOR_EMPRESA || d.ORIGEM_EMPRESA || '—');
      return `<tr>
        <td><span class="mono">#${pad(d.ID,6)}</span></td>
        <td>${fmtDate(d.DATA_TRANSFERENCIA)}</td>
        <td>${esc(d.COLABORADOR_NOME || '—')}</td>
        <td>${empresa}</td>
        <td><span class="badge dev">${qtd} ${qtd===1?'item':'itens'}</span></td>
        <td><a href="api/termo-devolucao-print.php?id=${d.ID}" target="_blank" class="btn sm outline" style="text-decoration:none">Ver / PDF</a></td>
        <td><span class="btn-disabled">&#128196; Ver Assinado</span></td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">&#10060;</div>Erro: ${esc(e.message)}</div></td></tr>`;
  }
}

async function loadNotas() {
  const tbody = document.getElementById('tbody-notas');
  try {
    const r = await fetch('api/notas-transporte.php?action=list');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (!Array.isArray(data) || !data.length) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">&#128666;</div>Nenhuma nota emitida ainda.</div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(n => {
      const qtd    = Number(n.QTD_ITENS) || 0;
      const origem = esc(n.ORIGEM_EMPRESA || '—');
      const dest   = esc(n.DESTINO_EMPRESA || '—');
      return `<tr>
        <td><span class="mono">#${pad(n.ID_NOTA,6)}</span></td>
        <td>${fmtDate(n.DATA_EMISSAO)}</td>
        <td>${esc(n.COLABORADOR_NOME || '—')}</td>
        <td style="font-size:12px">${origem} <span style="color:var(--muted-fg)">&#8594;</span> ${dest}</td>
        <td><span class="badge nota">${qtd} ${qtd===1?'item':'itens'}</span></td>
        <td><a href="api/nota-print.php?id=${n.ID_NOTA}" target="_blank" class="btn sm outline" style="text-decoration:none">Ver / PDF</a></td>
        <td><span class="btn-disabled">&#128196; Ver Assinado</span></td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">&#10060;</div>Erro: ${esc(e.message)}</div></td></tr>`;
  }
}

function loadAll() { loadTermos(); loadNotas(); loadDevolucoes(); }
document.addEventListener('authReady', loadAll);
</script>
</body>
</html>
