<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Requisitar — EPI Manager</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <div class="page-head">
    <div>
      <h1>Requisitar Reabastecimento</h1>
      <p>Solicite a reposição de EPIs entre empresas / unidades</p>
    </div>
    <button class="btn accent" onclick="abrirModal()">+ Nova Requisição</button>
    <script>if(!window.abrirModal) window.abrirModal = function(){ console.warn('abrirModal fallback: main script not loaded'); };</script>
  </div>

  <!-- Sub-tabs -->
  <div style="display:flex;gap:3px;margin-bottom:0">
    <button id="tab-0" class="ftab ftab-main active" onclick="setTab(0)">⏳ Aguardando Aprovação <span class="tab-badge" id="badge-0">0</span></button>
    <button id="tab-1" class="ftab ftab-main"        onclick="setTab(1)">✅ Aprovadas <span class="tab-badge" id="badge-1">0</span></button>
    <button id="tab-2" class="ftab ftab-main"        onclick="setTab(2)">🚛 Em Rota <span class="tab-badge" id="badge-2">0</span></button>
    <button id="tab-3" class="ftab ftab-main"        onclick="setTab(3)">🏁 Finalizadas <span class="tab-badge" id="badge-3">0</span></button>
  </div>
  <div class="folder-panel" id="folder-panel">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Data</th>
          <th>Solicitante</th>
          <th>Origem</th>
          <th>Destino</th>
          <th>Prioridade</th>
          <th>Itens</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8" style="text-align:center;color:var(--muted-fg);padding:32px">Carregando…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Modal nova requisição -->
  <div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center">
    <div class="card" style="width:min(980px,96vw);max-height:90vh;overflow-y:auto;padding:28px 30px;position:relative">
      <h2 style="margin:0 0 18px;font-size:17px">Nova Requisição de Reabastecimento</h2>

      <div class="req-grid">
        <div class="req-main">
          <div style="display:flex;flex-direction:column;gap:12px">
            <div style="max-width:320px">
              <label class="label">Tipo de Requisição</label>
              <select id="tipo-requisicao" class="input" onchange="onTipoRequisicaoChange()" style="max-width:320px"></select>
            </div>

            <div id="destino-fields" style="display:none">
              <label class="label">Empresa Destino</label>
              <select id="emp-destino" class="input" onchange="loadUnidades('destino',this.value)">
                <option value="">Selecione…</option>
              </select>
            </div>
            <div id="destino-fields-un" style="display:none">
              <label class="label">Unidade Destino</label>
              <select id="un-destino" class="input" onchange="loadSubunidades('destino',this.value)">
                <option value="">Selecione…</option>
              </select>
            </div>
            <div id="destino-fields-sub" style="display:none">
              <label class="label">Subunidade Destino <span style="color:var(--muted-fg)">(opcional)</span></label>
              <select id="sub-destino" class="input">
                <option value="">Selecione…</option>
              </select>
            </div>

            <div id="emp-origem-wrap">
              <label class="label">Empresa Origem</label>
              <select id="emp-origem" class="input" onchange="loadUnidades('origem',this.value)">
                <option value="">Selecione…</option>
              </select>
            </div>
            <div id="un-origem-wrap">
              <label class="label">Unidade Origem</label>
              <select id="un-origem" class="input" onchange="loadSubunidades('origem',this.value)">
                <option value="">Selecione…</option>
              </select>
            </div>
            <div id="sub-origem-wrap">
              <label class="label">Subunidade Origem <span style="color:var(--muted-fg)">(opcional)</span></label>
              <select id="sub-origem" class="input">
                <option value="">Selecione…</option>
              </select>
            </div>
            <div style="max-width:200px">
              <label class="label">Prioridade</label>
              <select id="prioridade" class="input">
                <option value="Normal">Normal</option>
                <option value="Urgente">Urgente</option>
              </select>
            </div>
          </div>

          <div style="margin-top:14px">
            <label class="label">Observação</label>
            <textarea id="observacao" class="input" rows="2" placeholder="Motivo ou informações adicionais…" style="resize:vertical"></textarea>
          </div>
        </div>

        <div class="req-items">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <strong style="font-size:14px">EPIs Solicitados</strong>
            <button class="btn" style="font-size:12px;padding:5px 12px" onclick="addItem()">+ Adicionar EPI</button>
          </div>
          <!-- sugestões customizadas para combobox de EPI (substitui datalist para permitir estilização) -->
          <div id="itens-container">
            <!-- linhas de item geradas por addItem() -->
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px">
        <button class="btn" onclick="fecharModal()">Cancelar</button>
        <button class="btn accent" id="btn-salvar" onclick="salvar()">Salvar Requisição</button>
      </div>
    </div>
  </div>

  <!-- Modal detalhes / itens -->
  <div id="detail-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center">
    <div class="card" style="width:min(580px,96vw);max-height:85vh;overflow-y:auto;padding:24px 28px">
      <h2 style="margin:0 0 14px;font-size:16px">Itens da Requisição</h2>
      <table>
        <thead><tr><th>EPI</th><th>CA</th><th>Qtd</th><th>Prioridade</th></tr></thead>
        <tbody id="detail-tbody">
          <tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted-fg)">Carregando…</td></tr>
        </tbody>
      </table>
      <div style="display:flex;justify-content:flex-end;margin-top:16px">
        <button class="btn" onclick="document.getElementById('detail-overlay').style.display='none'">Fechar</button>
      </div>
    </div>
  </div>

  <style>
    .ftab{display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;font-family:inherit;transition:background .15s,color .15s,box-shadow .15s;white-space:nowrap}
    .ftab-main{padding:10px 22px;font-size:14px;font-weight:500;border-radius:10px 10px 0 0;border:1.5px solid var(--border);border-bottom:none;background:oklch(0.94 0.015 140);color:var(--muted-fg);margin-bottom:0}
    .ftab-main:hover{background:oklch(0.90 0.025 140);color:var(--fg)}
    .ftab-main.active{background:oklch(0.28 0.05 150);color:#fff;border-color:oklch(0.28 0.05 150);font-weight:700;box-shadow:0 -2px 8px rgba(0,0,0,.12)}
    .folder-panel{background:var(--card);border:1.5px solid oklch(0.28 0.05 150);border-radius:0 12px 12px 12px;box-shadow:var(--shadow);overflow:hidden}
    .tab-badge{margin-left:6px;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;background:rgba(0,0,0,.18);color:inherit}
    .ftab-main.active .tab-badge{background:rgba(255,255,255,.28);color:#fff}
    .badge.prio-urgente{background:color-mix(in oklab,#e74c3c 18%,#fff);color:#a93226;font-weight:700}
    .badge.prio-normal{background:color-mix(in oklab,var(--primary) 18%,#fff);color:var(--primary)}
    .item-row{display:grid;grid-template-columns:minmax(320px,1fr) 90px 28px;gap:10px;align-items:center;margin-bottom:8px}
    .req-grid{display:grid;grid-template-columns:45% 55%;gap:18px}
    .req-items{background:var(--surface-alt,#f8f8f8);border:1px solid var(--border);border-radius:12px;padding:12px}
    @media(max-width:900px){.req-grid{grid-template-columns:1fr}.req-items{order:2}}
    /* EPI combobox wrapper + input styling to mimic select */
    .epi-wrap{display:flex;align-items:center;position:relative;width:100%}
    .epi-wrap .epi-input{flex:1;padding:0 44px 0 12px;height:38px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--fg);font-size:14px}
    .epi-wrap .epi-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in oklab,var(--primary) 12%,transparent);outline:none}
    .epi-wrap::after{content:'';position:absolute;right:8px;width:32px;height:32px;border-radius:8px;background:var(--accent);display:inline-block;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:center;background-size:14px 14px;cursor:pointer}
    .epi-input::-ms-clear{display:none}
    .epi-suggest{position:absolute;left:0;top:calc(100% + 8px);width:100%;background:#111827;color:#fff;border-radius:10px;padding:6px;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:999;max-height:260px;overflow:auto}
    .epi-option{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px}
    .epi-option:hover,.epi-option.active{background:rgba(255,255,255,0.04)}
  </style>
</div>

<script src="js/auth.js"></script>
<script src="js/_layout.js"></script>
<script>
// Defensive fallbacks so UI handlers exist even if script errors occur early
if (!window.abrirModal) window.abrirModal = function(){ console.warn('abrirModal called before script initialization'); };
if (!window.fecharModal) window.fecharModal = function(){ console.warn('fecharModal called before script initialization'); };
if (!window.addItem) window.addItem = function(){ console.warn('addItem called before script initialization'); };
if (!window.salvar) window.salvar = function(){ console.warn('salvar called before script initialization'); };

const API = 'api/reabastecimento.php';
console.log('requisitar.html script start');
let epis = [];
let currentTab = 0;
let currentRows = [];
let _reqUser = null; // Renomeado para evitar conflito com window.currentUser do auth.js

/* ── Inicialização ── */
let isSuper = false;
async function initForUser(user){
  _reqUser = user || null;
  isSuper = user && (user.perfil === 0 || user.super_user === true || user.super_user === 1);
  await Promise.all([carregarEpis(), carregarEmpresas()]);
  carregarCounts();
  carregarTab(0);
}

// Support both cases: event may have been dispatched before this script ran
try{
  if (typeof window.currentUser !== 'undefined' && window.currentUser) {
    // currentUser may be a getter; call init immediately
    initForUser(window.currentUser);
  } else {
    document.addEventListener('authReady', function(e){ initForUser(e.detail); });
  }
} catch(err){ document.addEventListener('authReady', function(e){ initForUser(e.detail); }); }

async function carregarEpis(){
  const r = await fetch(API + '?action=epis');
  if(!r.ok) return;
  epis = await r.json();
  console.log('carregarEpis -> epis count', Array.isArray(epis) ? epis.length : typeof epis);
  // popular datalist para combobox
  const dl = document.getElementById('epis-datalist');
  if(dl){
    dl.innerHTML = '';
    epis.forEach(e => {
      const text = `${e.DESCRICAO}${e.CA ? ' (CA ' + e.CA + ')' : ''}`;
      const opt = document.createElement('option');
      opt.value = text;
      opt.dataset.id = e.ID;
      dl.appendChild(opt);
    });
  }
}

async function carregarEmpresas(){
  const r = await fetch(API + '?action=empresas');
  if(!r.ok) return;
  const lista = await r.json();
  // garante que a empresa do usuário esteja presente mesmo sem estoque
  try {
    const userEmpresaId = _reqUser?.empresa_id || null;
    const hasUser = lista.some(e => String(e.ID_EMPRESA) === String(userEmpresaId));
    if (userEmpresaId && !hasUser) {
      const r2 = await fetch('api/empresas.php');
      if (r2.ok) {
        const all = await r2.json();
        const found = all.find(c => String(c.ID_EMPRESA) === String(userEmpresaId));
        if (found) lista.unshift(found);
      }
    }
  } catch(e){ /* noop */ }

  ['emp-origem', 'emp-destino'].forEach(id => {
    const sel = document.getElementById(id);
    if(!sel) return;
    sel.innerHTML = '<option value="">Selecione…</option>';
    lista.forEach(e => sel.insertAdjacentHTML('beforeend', `<option value="${e.ID_EMPRESA}">${e.RAZAO_SOCIAL}</option>`));
  });
}

async function loadUnidades(lado, empId){
  const unId = `un-${lado}`;
  const subId = `sub-${lado}`;
  const sel = document.getElementById(unId);
  const subSel = document.getElementById(subId);
  sel.innerHTML = '<option value="">Selecione…</option>';
  subSel.innerHTML = '<option value="">Selecione…</option>';
  // show/hide empresa wrapper if caller wants
  const empWrap = document.getElementById(`emp-${lado}-wrap`);
  if(empWrap) empWrap.style.display = '';
  const url = `${API}?action=unidades` + (empId ? `&empresa_id=${encodeURIComponent(empId)}` : '');
  const r = await fetch(url);
  if(!r.ok) return;
  const lista = await r.json();
  lista.forEach(u => sel.insertAdjacentHTML('beforeend', `<option value="${u.ID_UNIDADE}">${u.NOME}</option>`));
  if(empWrap) empWrap.style.display = '';
}

async function loadSubunidades(lado, unId){
  const subId = `sub-${lado}`;
  const subSel = document.getElementById(subId);
  subSel.innerHTML = '<option value="">Selecione…</option>';
  const url = `${API}?action=subunidades` + (unId ? `&unidade_id=${encodeURIComponent(unId)}` : '');
  const r = await fetch(url);
  if(!r.ok) return;
  const lista = await r.json();
  lista.forEach(s => subSel.insertAdjacentHTML('beforeend', `<option value="${s.ID_SUBUNIDADE}">${s.NOME}</option>`));
  // hide subunidade container if there are no real options
  const wrap = document.getElementById(`sub-${lado}-wrap`);
  const hasOptions = lista && lista.length;
  if(wrap) wrap.style.display = hasOptions ? '' : 'none';
}

/* ── Tabs ── */
function setTab(idx){
  currentTab = idx;
  [0,1,2,3].forEach(i => {
    document.getElementById(`tab-${i}`).classList.toggle('active', i===idx);
  });
  carregarTab(idx);
}

async function carregarCounts(){
  const r = await fetch(API + '?action=counts');
  if(!r.ok) return;
  const c = await r.json();
  document.getElementById('badge-0').textContent = c.pendentes;
  document.getElementById('badge-1').textContent = c.aprovadas;
  document.getElementById('badge-2').textContent = c.em_rota;
  document.getElementById('badge-3').textContent = c.finalizadas;
}

async function carregarTab(status){
  const tb = document.getElementById('tbody');
  tb.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted-fg);padding:32px">Carregando…</td></tr>';
  if (status === 3) {
    const [r1, r2] = await Promise.all([
      fetch(`${API}?action=list&status=3`),
      fetch(`${API}?action=list&status=4`)
    ]);
    if(!r1.ok || !r2.ok){ tb.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#c0392b;padding:32px">Erro ao carregar</td></tr>'; return; }
    const a = await r1.json();
    const b = await r2.json();
    currentRows = [...a, ...b];
  } else {
    const r = await fetch(`${API}?action=list&status=${status}`);
    if(!r.ok){ tb.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#c0392b;padding:32px">Erro ao carregar</td></tr>'; return; }
    currentRows = await r.json();
  }
  renderRows(currentRows, status);
}

function renderRows(rows, status){
  const tb = document.getElementById('tbody');
  if(!rows.length){
    tb.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted-fg);padding:32px">Nenhum registro</td></tr>';
    return;
  }
  tb.innerHTML = rows.map(r => {
    const prioClass = r.PRIORIDADE === 'Urgente' ? 'prio-urgente' : 'prio-normal';
    const origemStr = [r.ORIGEM_EMPRESA, r.ORIGEM_UNIDADE, r.ORIGEM_SUBUNIDADE].filter(Boolean).join(' › ');
    let destinoStr = [r.DESTINO_EMPRESA, r.DESTINO_UNIDADE, r.DESTINO_SUBUNIDADE].filter(Boolean).join(' › ');
    if (!destinoStr && r.DESTINO_TIPO === 'geral') destinoStr = 'Geral (todas as empresas)';
    if (!destinoStr && r.DESTINO_TIPO === 'matriz') destinoStr = 'Matriz LARSIL';
    const dt = r.DATA_SOLICITACAO ? r.DATA_SOLICITACAO.slice(0,16).replace('T',' ') : '—';
    const statusLabel = r.STATUS === 0 ? 'Aguardando Aprovação'
      : r.STATUS === 1 ? 'Aprovada'
      : r.STATUS === 2 ? 'Em Rota'
      : r.STATUS === 3 ? 'Finalizada (Entregue)'
      : r.STATUS === 4 ? 'Finalizada (Recusada)'
      : '—';
    const statusColor = r.STATUS === 3 ? 'color:#15803d;font-weight:700' : r.STATUS === 4 ? 'color:#b91c1c;font-weight:700' : '';
    let acoes = `<button class="btn" style="font-size:11px;padding:4px 9px" onclick="verItens(${r.ID})">Ver Itens</button> `;
    if(isSuper && status === 0) acoes += `<button class="btn accent" style="font-size:11px;padding:4px 9px" onclick="avancarStatus(${r.ID},1)">Aprovar</button> <button class="btn" style="font-size:11px;padding:4px 9px;color:#c0392b" onclick="avancarStatus(${r.ID},4)">Recusar</button>`;
    if(isSuper && status === 1) acoes += `<button class="btn accent" style="font-size:11px;padding:4px 9px" onclick="avancarStatus(${r.ID},2)">Marcar em rota</button>`;
    if(isSuper && status === 2) acoes += `<button class="btn accent" style="font-size:11px;padding:4px 9px" onclick="avancarStatus(${r.ID},3)">Finalizar (entregue)</button>`;
    return `<tr>
      <td>${r.ID}</td>
      <td style="white-space:nowrap">${dt}</td>
      <td>${r.SOLICITANTE_NOME || '—'}</td>
      <td style="font-size:12px">${origemStr || '—'}</td>
      <td style="font-size:12px">${destinoStr || '—'}</td>
      <td><span class="badge ${prioClass}">${r.PRIORIDADE}</span><div style="font-size:11px;${statusColor}">${statusLabel}</div></td>
      <td style="text-align:center">${r.QTD_ITENS}</td>
      <td style="white-space:nowrap">${acoes}</td>
    </tr>`;
  }).join('');
}

async function avancarStatus(id, novoStatus){
  const r = await fetch(`${API}?action=status`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id, status: novoStatus})
  });
  const d = await r.json();
  if(d.success){ toast('Status atualizado!'); carregarCounts(); carregarTab(currentTab); }
  else toast(d.error || 'Erro ao atualizar', 'error');
}

async function excluir(id){
  if(!confirm('Excluir esta requisição?')) return;
  const r = await fetch(`${API}?action=deletar`, {
    method:'DELETE',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });
  const d = await r.json();
  if(d.success){ toast('Requisição excluída'); carregarCounts(); carregarTab(currentTab); }
  else toast(d.error || 'Erro ao excluir', 'error');
}

async function verItens(id){
  const overlay = document.getElementById('detail-overlay');
  overlay.style.display = 'flex';
  const tb = document.getElementById('detail-tbody');
  tb.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted-fg)">Carregando…</td></tr>';
  const r = await fetch(`${API}?action=itens&id=${id}`);
  if(!r.ok){ tb.innerHTML = '<tr><td colspan="4" style="color:#c0392b;text-align:center;padding:16px">Erro</td></tr>'; return; }
  const itens = await r.json();
  tb.innerHTML = itens.length
    ? itens.map(it => `<tr><td>${it.DESCRICAO}</td><td>${it.CA || '—'}</td><td>${it.QUANTIDADE}</td><td>${it.PRIORIDADE}</td></tr>`).join('')
    : '<tr><td colspan="4" style="text-align:center;padding:16px;color:var(--muted-fg)">Sem itens</td></tr>';
}

/* ── Modal nova requisição ── */
let itemCount = 0;

async function abrirModal(){
  console.log('abrirModal invoked');
  document.getElementById('modal-overlay').style.display = 'flex';
  // reset form
  // ensure options are loaded in case init didn't run yet
  await Promise.all([carregarEpis(), carregarEmpresas()]);

  ['emp-origem','un-origem','sub-origem','emp-destino','un-destino','sub-destino','observacao'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('prioridade').value = 'Normal';
  setupTipoRequisicao();
  document.getElementById('itens-container').innerHTML = '';
  itemCount = 0;
  addItem();
  await applyOrigemUsuario();
  await onTipoRequisicaoChange();
}

function setupTipoRequisicao(){
  const sel = document.getElementById('tipo-requisicao');
  if(!sel) return;
  sel.innerHTML = '';
  sel.insertAdjacentHTML('beforeend','<option value="direcionada">Requisitar direcionado</option>');
  sel.insertAdjacentHTML('beforeend','<option value="geral">Requisitar geral (todas as empresas)</option>');
  const empresaId = _reqUser?.empresa_id || 0;
  if (isSuper || Number(empresaId) === 3) {
    sel.insertAdjacentHTML('beforeend','<option value="matriz">Requisitar para Matriz LARSIL</option>');
  }
  sel.value = 'geral';
}

async function applyOrigemUsuario(){
  const empresaId = _reqUser?.empresa_id || '';
  const unidadeId = _reqUser?.unidade_id || '';
  const subId = _reqUser?.subunidade_id || _reqUser?.almoxarifado_id || '';
  const emp = document.getElementById('emp-origem');
  const un  = document.getElementById('un-origem');
  const sub = document.getElementById('sub-origem');
  if (!emp || !un || !sub) return;
  // ensure wrappers are visible by default
  const empWrap = document.getElementById('emp-origem-wrap');
  const unWrap = document.getElementById('un-origem-wrap');
  const subWrap = document.getElementById('sub-origem-wrap');
  if(empWrap) empWrap.style.display = '';
  if(unWrap) unWrap.style.display = '';
  if(subWrap) subWrap.style.display = '';
  if (empresaId) {
    // ensure empresa option exists; if not, try to fetch company details and add it
    let opt = emp.querySelector(`option[value="${empresaId}"]`);
    if(!opt){
      try{
        const r = await fetch('api/empresas.php');
        if(r.ok){
          const all = await r.json();
          const found = all.find(c => String(c.ID_EMPRESA) === String(empresaId));
          if(found){ emp.insertAdjacentHTML('afterbegin', `<option value="${found.ID_EMPRESA}">${found.RAZAO_SOCIAL}</option>`); }
        }
      }catch(e){ /* noop */ }
    }
    emp.value = empresaId;
    await loadUnidades('origem', empresaId);
    try{ emp.dispatchEvent(new Event('change')); }catch(e){}
    // origin is prefilled — lock the empresa field so user cannot alter
    emp.disabled = true;
  }
  if (unidadeId) {
    // ensure unidade option exists; if not, append a placeholder
    let uopt = un.querySelector(`option[value="${unidadeId}"]`);
    if(!uopt){
      // try reloading unidades once
      await loadUnidades('origem', empresaId);
      uopt = un.querySelector(`option[value="${unidadeId}"]`);
      if(!uopt){ un.insertAdjacentHTML('beforeend', `<option value="${unidadeId}">Unidade ${unidadeId}</option>`); }
    }
    un.value = unidadeId;
    await loadSubunidades('origem', unidadeId);
    try{ un.dispatchEvent(new Event('change')); }catch(e){}
    // lock unidade
    un.disabled = true;
    // if empresa isn't provided (unit not tied to empresa), hide empresa selector
    if(!empresaId){ const wrap = document.getElementById('emp-origem-wrap'); if(wrap) wrap.style.display = 'none'; }
  }
  if (subId) {
    sub.value = subId;
    // lock subunidade
    sub.disabled = true;
    // ensure wrapper visible
    const subWrap2 = document.getElementById('sub-origem-wrap'); if(subWrap2) subWrap2.style.display = '';
  }
}

async function onTipoRequisicaoChange(){
  const tipo = document.getElementById('tipo-requisicao')?.value || 'direcionada';
  const destEmp = document.getElementById('emp-destino');
  const destUni = document.getElementById('un-destino');
  const destSub = document.getElementById('sub-destino');
  const show = (id, on) => { const el = document.getElementById(id); if(el) el.style.display = on ? '' : 'none'; };
  const showDest = tipo !== 'geral';
  show('destino-fields', showDest);
  show('destino-fields-un', showDest);
  show('destino-fields-sub', showDest);

  if (!destEmp || !destUni || !destSub) return;
  destEmp.disabled = false;
  destUni.disabled = false;
  destSub.disabled = false;

  if (tipo === 'geral') {
    // Geral: destina para todas as empresas — hide/disable destination controls
    destEmp.value = '';
    destUni.value = '';
    destSub.value = '';
    destEmp.disabled = true; destUni.disabled = true; destSub.disabled = true;
    const ids = ['destino-fields','destino-fields-un','destino-fields-sub']; ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display='none'; });
    // remove from tab order
    destEmp.tabIndex = -1; destUni.tabIndex = -1; destSub.tabIndex = -1;
  } else if (tipo === 'matriz') {
    destEmp.value = '3';
    destEmp.disabled = true;
    await loadUnidades('destino', 3);
  } else {
    // Direcionada: let the user choose the destination (do not auto-fill for non-super)
    destEmp.value = '';
    destUni.value = '';
    destSub.value = '';
    destEmp.disabled = false;
    destUni.disabled = false;
    destSub.disabled = false;
  }
}

function fecharModal(){
  document.getElementById('modal-overlay').style.display = 'none';
}

function addItem(){
  itemCount++;
  const idx = itemCount;
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = `item-row-${idx}`;
  row.innerHTML = `
    <div class="epi-wrap">
      <input class="input epi-input" id="epi-${idx}" placeholder="EPI…" autocomplete="off">
      <input type="hidden" id="epi-id-${idx}" value="">
      <div class="epi-suggest" id="epi-sug-${idx}" style="display:none"></div>
    </div>
    <input  class="input" id="qty-${idx}" type="number" value="1" min="1" placeholder="Qtd" style="text-align:center;max-width:90px">
    <button type="button" class="btn" style="padding:4px 8px;color:#c0392b;font-weight:700;font-size:15px;line-height:1" onclick="document.getElementById('item-row-${idx}').remove()">×</button>
  `;
  document.getElementById('itens-container').appendChild(row);
  console.log('addItem -> created row', idx);

  // auto-adjust select width to selected option and add tooltip
  const input = document.getElementById(`epi-${idx}`);
  const hid = document.getElementById(`epi-id-${idx}`);
  if(input){
    // custom suggestion dropdown
    const sug = document.getElementById(`epi-sug-${idx}`);
    let selIndex = -1;
    function renderSuggestions(list){
      if(!sug) return;
      if(!list || !list.length){ sug.style.display='none'; sug.innerHTML=''; selIndex=-1; return; }
      sug.style.display='block';
      sug.innerHTML = list.map(it => `<div class="epi-option" data-id="${it.ID}">${(it.DESCRICAO||'') + (it.CA? ' (CA ' + it.CA + ')':'')}</div>`).join('');
    }

    input.addEventListener('input', function(e){
      const v = input.value || '';
      const q = v.trim().toLowerCase();
      // show best matches; if empty, show top items so the dropdown is useful on focus
      const matches = q.length ? epis.filter(e=>((e.DESCRICAO||'') + ' ' + (e.CA||'')).toLowerCase().includes(q)).slice(0,10) : epis.slice(0,10);
      // if exact match, set id
      const exact = epis.find(e => (((e.DESCRICAO||'') + (e.CA? ' (CA ' + e.CA + ')':'')).toLowerCase() === q));
      if(exact){ hid.value = exact.ID; input.title = exact.DESCRICAO; } else { hid.value = ''; input.title = v; }
      renderSuggestions(matches);
      adjustEpiInputSize(input);
    });

    input.addEventListener('keydown', function(ev){
      if(!sug || sug.style.display==='none') return;
      const items = Array.from(sug.querySelectorAll('.epi-option'));
      if(ev.key === 'ArrowDown'){ ev.preventDefault(); selIndex = Math.min(items.length-1, selIndex+1); items.forEach((it,i)=> it.classList.toggle('active', i===selIndex)); items[selIndex]?.scrollIntoView({block:'nearest'}); }
      else if(ev.key === 'ArrowUp'){ ev.preventDefault(); selIndex = Math.max(0, selIndex-1); items.forEach((it,i)=> it.classList.toggle('active', i===selIndex)); items[selIndex]?.scrollIntoView({block:'nearest'}); }
      else if(ev.key === 'Enter'){ ev.preventDefault(); if(selIndex>=0){ const it = items[selIndex]; chooseOption(it); } }
      else if(ev.key === 'Escape'){ sug.style.display='none'; }
    });

    function chooseOption(el){ if(!el) return; const id = el.dataset.id; const txt = el.textContent || el.innerText; hid.value = id; input.value = txt; input.title = txt; sug.style.display='none'; selIndex=-1; adjustEpiInputSize(input); }

    if(sug){
      sug.addEventListener('click', function(ev){ const c = ev.target.closest('.epi-option'); if(c) chooseOption(c); });
      sug.addEventListener('mousedown', function(ev){ ev.preventDefault(); });
    }

    // show suggestions on focus (like datalist behavior)
    input.addEventListener('focus', function(){
      const q = (input.value || '').trim().toLowerCase();
      const matches = q.length ? epis.filter(e=>((e.DESCRICAO||'') + ' ' + (e.CA||'')).toLowerCase().includes(q)).slice(0,10) : epis.slice(0,10);
      renderSuggestions(matches);
    });

    // clicking the wrapper (chevron area) should open suggestions too
    const wrap = row.querySelector('.epi-wrap');
    if(wrap){
      wrap.addEventListener('click', function(ev){
        if(ev.target.closest('.epi-suggest')) return;
        input.focus();
        const q = (input.value || '').trim().toLowerCase();
        const matches = q.length ? epis.filter(e=>((e.DESCRICAO||'') + ' ' + (e.CA||'')).toLowerCase().includes(q)).slice(0,10) : epis.slice(0,10);
        renderSuggestions(matches);
      });
    }

    // hide on blur
    input.addEventListener('blur', function(){ setTimeout(()=>{ if(sug) sug.style.display='none'; selIndex=-1; }, 150); });

    // size on creation
    adjustEpiInputSize(input);
  }
}

function adjustEpiSelectSize(sel){
  // no-op: combobox inputs handle sizing via CSS
  return;
}

function adjustEpiInputSize(input){
  if(!input) return;
  // make the epi input fill the available space so long names are visible
  input.style.width = '100%';
}

function adjustAllEpiSizes(){
  document.querySelectorAll('.epi-input').forEach(el => adjustEpiInputSize(el));
}

window.addEventListener('resize', function(){ adjustAllEpiSizes(); });

async function salvar(){
  const btn = document.getElementById('btn-salvar');
  btn.disabled = true;
  try {
    const itensEls = document.getElementById('itens-container').querySelectorAll('.item-row');
    const itens = [];
    for(const row of itensEls){
      const idx = row.id.replace('item-row-','');
      // try hidden id first (set by combobox match), fallback to raw value
      const hidden = document.getElementById(`epi-id-${idx}`)?.value || '';
      const raw = document.getElementById(`epi-${idx}`)?.value || '';
      const epiId = hidden || raw;
      const qty   = parseInt(document.getElementById(`qty-${idx}`)?.value) || 0;
      const prio  = document.getElementById('prioridade')?.value || 'Normal';
      if(epiId && qty > 0) itens.push({epi_id: parseInt(epiId), quantidade: qty, prioridade: prio});
      else if(raw && !epiId){ toast('EPI não válido: ' + raw, 'error'); btn.disabled=false; return; }
    }
    if(!itens.length){ toast('Adicione ao menos um EPI', 'error'); return; }

    const tipoReq = document.getElementById('tipo-requisicao')?.value || 'direcionada';
    let destEmp = document.getElementById('emp-destino').value || null;
    let destUni = document.getElementById('un-destino').value || null;
    let destSub = document.getElementById('sub-destino').value || null;
    if (tipoReq === 'geral') { destEmp = null; destUni = null; destSub = null; }
    if (tipoReq === 'matriz') { destEmp = 3; }

    const payload = {
      empresa_id:          document.getElementById('emp-origem').value   || null,
      unidade_id:          document.getElementById('un-origem').value    || null,
      subunidade_id:       document.getElementById('sub-origem').value   || null,
      destino_empresa_id:  destEmp,
      destino_unidade_id:  destUni,
      destino_subunidade_id: destSub,
      destino_tipo:        tipoReq,
      observacao:          document.getElementById('observacao').value.trim() || null,
      prioridade:          document.getElementById('prioridade').value,
      itens
    };

    const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    const d = await r.json();
    if(d.success){
      toast('Requisição criada com sucesso!');
      fecharModal();
      carregarCounts();
      carregarTab(0);
      setTab(0);
    } else {
      toast(d.error || 'Erro ao salvar', 'error');
    }
  } finally {
    btn.disabled = false;
  }
}

window.abrirModal = abrirModal;
window.fecharModal = fecharModal;
window.addItem = addItem;
window.salvar = salvar;

const _do = document.getElementById('detail-overlay');
if(_do) _do.addEventListener('click', function(e){ if(e.target===this) this.style.display='none'; });
