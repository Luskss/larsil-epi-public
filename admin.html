<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Administração - EPI Manager</title>
<link rel="stylesheet" href="css/styles.css">
<style>
/* Restricted */
.restricted-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:56px 24px;color:var(--muted-fg)}
.restricted-box svg{opacity:.35}
.restricted-box p{font-size:14px;margin:0}

/* User table */
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--primary);flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.badge.active{background:#dcfce7;color:#15803d}
.badge.inactive{background:#fee2e2;color:#dc2626}
.badge.super{background:#dbeafe;color:#1d4ed8}
.badge.normal{background:var(--muted);color:var(--muted-fg)}
.actions-cell{display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;color:var(--muted-fg);line-height:1;transition:color .15s,background .15s;font-size:11px;font-weight:600}
.icon-btn:hover{background:var(--accent);color:var(--fg)}
.icon-btn.danger:hover{background:#fee2e2;color:#dc2626}
.icon-btn.warn:hover{background:#fef9c3;color:#a16207}
.icon-btn.success:hover{background:#dcfce7;color:#15803d}
td.user-name-cell{display:flex;align-items:center;gap:10px;min-width:180px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-bg.hidden{display:none}
.modal-box{background:#fff;border-radius:14px;padding:28px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-box h3{margin:0 0 20px;font-size:17px}
.mfield{margin-bottom:14px}
.mfield label{display:block;font-size:11px;font-weight:700;color:var(--muted-fg);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px}
.pw-wrap{position:relative;display:flex;align-items:center}
.pw-wrap .input{flex:1;padding-right:36px}
.pw-toggle{position:absolute;right:8px;background:none;border:none;cursor:pointer;color:var(--muted-fg);padding:2px;line-height:1}
.eye-icon{display:block}
/* two-column modal */
.modal-grid{display:flex;gap:16px;align-items:flex-start}
.modal-grid .modal-col{flex:1;min-width:0}
@media (max-width:640px){.modal-grid{flex-direction:column}}
</style>
</head>
<body>
<div id="app">
  <div class="page-head">
    <div><h1>Administração</h1><p>Gerenciamento de usuários do sistema</p></div>
    <button class="btn accent" id="btn-novo" onclick="openCreate()" style="display:none">+ Novo usuário</button>
  </div>

  <!-- Acesso restrito -->
  <div class="card" id="restricted-view">
    <div class="restricted-box">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="2" y1="2" x2="22" y2="22"/>
      </svg>
      <p>Acesso restrito a administradores.</p>
    </div>
  </div>

  <!-- Painel admin -->
  <div id="admin-view" style="display:none">
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead>
          <tr>
            <th style="min-width:200px">Usuário</th>
            <th>E-mail</th>
            <th style="width:90px">Status</th>
            <th style="width:220px">Localização</th>
            <th style="width:100px">Perfil</th>
            <th style="width:170px;text-align:right">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-users">
          <tr><td colspan="6" style="text-align:center;color:var(--muted-fg);padding:32px">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal: Novo usuário -->
<div class="modal-bg hidden" id="modal-create" onclick="if(event.target===this)closeCreate()">
  <div class="modal-box">
    <h3>Novo usuário</h3>
    <div class="modal-grid">
      <div class="modal-col">
        <div class="mfield"><label>Nome *</label><input class="input" id="c-nome" placeholder="Nome completo" style="width:100%"></div>
        <div class="mfield"><label>E-mail *</label><input class="input" id="c-email" type="email" placeholder="email@exemplo.com" style="width:100%"></div>
        <div class="mfield">
          <label>Senha inicial *</label>
          <div class="pw-wrap">
            <input class="input" id="c-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
            <button class="pw-toggle" type="button" onclick="togglePw('c-senha',this)" tabindex="-1">
              <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-col">
        <div class="mfield" style="margin-top:6px"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="c-super"> Esse usuário será admin?</label></div>
        <div class="mfield" id="c-almoxarifado-wrap" style="display:none">
          <label>Vincular almoxarifado</label>
          <select class="input" id="c-empresa" style="width:100%;margin:6px 0"></select>
          <select class="input" id="c-unidade" style="width:100%;margin:6px 0"></select>
          <select class="input" id="c-subunidade" style="width:100%"></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn outline" onclick="closeCreate()">Cancelar</button>
      <button class="btn accent" onclick="saveCreate()">Criar usuário</button>
    </div>
  </div>
</div>

<!-- Modal: Realocar usuário -->
<div class="modal-bg hidden" id="modal-reallocate" onclick="if(event.target===this)closeReallocate()">
  <div class="modal-box">
    <h3>Realocar usuário</h3>
    <div class="modal-grid">
      <div class="modal-col">
        <div class="mfield"><label>Empresa</label><select class="input" id="re-empresa" style="width:100%;margin:6px 0"></select></div>
        <div class="mfield"><label>Unidade</label><select class="input" id="re-unidade" style="width:100%;margin:6px 0"></select></div>
        <div class="mfield"><label>Subunidade</label><select class="input" id="re-subunidade" style="width:100%"></select></div>
      </div>
      <div class="modal-col">
        <div class="mfield"><label>Usuário</label><div id="re-username" style="padding:8px 0;color:var(--muted-fg)"></div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn outline" onclick="closeReallocate()">Cancelar</button>
      <button class="btn accent" onclick="saveReallocate()">Salvar realocação</button>
    </div>
  </div>
</div>

<!-- Modal: Redefinir senha -->
<div class="modal-bg hidden" id="modal-reset" onclick="if(event.target===this)closeReset()">
  <div class="modal-box">
    <h3>Redefinir senha</h3>
    <p id="reset-label" style="margin:0 0 18px;color:var(--muted-fg);font-size:13px"></p>
    <div class="mfield">
      <label>Nova senha *</label>
      <div class="pw-wrap">
        <input class="input" id="r-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        <button class="pw-toggle" type="button" onclick="togglePw('r-senha',this)" tabindex="-1">
          <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn outline" onclick="closeReset()">Cancelar</button>
      <button class="btn accent" onclick="saveReset()">Salvar</button>
    </div>
  </div>
</div>

<script defer src="js/config.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/utils.js"></script>
<script defer src="js/_layout.js"></script>
<script>
let usersData = [];
let resetTargetId = null;
let currentUserId = null;
let empresasCache = null;
let unidadesCache = null;
let subunidadesCache = null;

const TRASH = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
const KEY   = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>';
const SHIELD= '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
const EYE   = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYEOFF= '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function initials(nome) {
  return (nome||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

document.addEventListener('authReady', async function(e) {
  const user = e.detail ?? {};
  currentUserId = user.id ?? null;

  // Verifica super_user via API (fonte de verdade = banco)
  const r = await fetch('api/admin.php?action=check');
  const d = await r.json();

  if (!d.super_user) {
    document.getElementById('restricted-view').style.display = '';
    document.getElementById('admin-view').style.display = 'none';
    return;
  }

  document.getElementById('restricted-view').style.display = 'none';
  document.getElementById('admin-view').style.display = '';
  document.getElementById('btn-novo').style.display = '';
  loadUsers();
});

async function loadUsers() {
  const tb = document.getElementById('tbody-users');
  const r  = await fetch('api/admin.php?action=list');
  if (!r.ok) { tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:#dc2626;padding:32px">Erro ao carregar usuários.</td></tr>'; return; }
  usersData = await r.json();

  // garante que temos os nomes de empresas/unidades/subunidades para exibir
  await loadAlmoxOptions().catch(() => {});

  if (!usersData.length) {
    tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted-fg);padding:32px">Nenhum usuário cadastrado.</td></tr>';
    return;
  }

  tb.innerHTML = usersData.map(u => {
    const isMe    = u.ID === currentUserId;
    const active  = u.IS_ACTIVE === 1;
    const isSuper = u.SUPER_USER === 1;

    const toggleActiveLabel = active ? 'Desativar' : 'Reativar';
    const toggleActiveClass = active ? 'danger' : 'success';
    const toggleActiveIcon  = active
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
    const toggleActiveBtn = isMe
      ? `<button class="icon-btn danger" style="opacity:.45" onclick="toast('Você não pode desativar sua própria conta.','warning')">${toggleActiveIcon} Desativar</button>`
      : `<button class="icon-btn ${toggleActiveClass}" title="${toggleActiveLabel}" onclick="toggleActive(${u.ID})">${toggleActiveIcon} ${toggleActiveLabel}</button>`;

    const toggleSuperBtn = isMe
      ? ''
      : `<button class="icon-btn warn" title="${isSuper ? 'Revogar admin' : 'Tornar admin'}" onclick="toggleSuper(${u.ID})">${SHIELD} ${isSuper ? 'Revogar admin' : 'Dar admin'}</button>`;
    const realocarBtn = isMe ? '' : `<button class="icon-btn" title="Realocar" onclick="openReallocate(${u.ID})">🔁 Realocar</button>`;
    // compõe texto de localização (empresa / unidade / subunidade)
    let locationText = '';
    try {
      const emp = (empresasCache || []).find(x => x.ID_EMPRESA == u.EMPRESA_ID);
      const uni = (unidadesCache || []).find(x => x.ID_UNIDADE == u.UNIDADE_ID);
      const sub = (subunidadesCache || []).find(x => x.ID_SUBUNIDADE == u.SUBUNIDADE_ID);
      const parts = [];
      if (emp) parts.push(emp.RAZAO_SOCIAL);
      if (uni) parts.push(uni.NOME);
      if (sub) parts.push(sub.NOME);
      if (parts.length) {
        locationText = parts.join(' / ');
      } else {
        // se não houver vínculo de localização, marca como Super Usuário (conforme pedido)
        locationText = (u.PERFIL === 0 || (u.EMPRESA_ID === null && u.UNIDADE_ID === null && u.SUBUNIDADE_ID === null)) ? 'Super Usuário' : 'Sem vínculo';
      }
    } catch (e) {
      locationText = '';
    }

    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="user-avatar">${esc(initials(u.NOME))}</div>
        <span>${esc(u.NOME)}${isMe ? ' <span style="font-size:11px;color:var(--muted-fg)">(você)</span>' : ''}</span>
      </div></td>
      <td style="color:var(--muted-fg);font-size:13px">${esc(u.EMAIL)}</td>
      <td><span class="badge ${active?'active':'inactive'}">${active?'Ativo':'Inativo'}</span></td>
      <td style="color:var(--muted-fg);font-size:13px">${esc(locationText)}</td>
      <td><span class="badge ${isSuper?'super':'normal'}">${isSuper?'Admin':'Padrão'}</span></td>
      <td class="actions-cell">
        <button class="icon-btn" title="Redefinir senha" onclick="openReset(${u.ID},'${esc(u.NOME)}')">${KEY} Redefinir senha</button>
        ${realocarBtn}
        ${toggleSuperBtn}
        ${toggleActiveBtn}
      </td>
    </tr>`;
  }).join('');
}

/* ── Criar usuário ── */
async function openCreate() {
  ['c-nome','c-email','c-senha'].forEach(id => document.getElementById(id).value = '');
  // reset admin checkbox and vinculo
  const chk = document.getElementById('c-super'); if (chk) chk.checked = false;
  const wrap = document.getElementById('c-almoxarifado-wrap'); if (wrap) wrap.style.display = '';
  document.getElementById('modal-create').classList.remove('hidden');
  // load empresas/unidades/subunidades for the selector (cached)
  loadAlmoxOptions().catch(e=>console.error(e));
  document.getElementById('c-nome').focus();
}
function closeCreate() { document.getElementById('modal-create').classList.add('hidden'); }

async function saveCreate() {
  const nome  = document.getElementById('c-nome').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const senha = document.getElementById('c-senha').value.trim();
  const isSuper = (document.getElementById('c-super')?.checked) ? 1 : 0;

  const empresaVal = document.getElementById('c-empresa')?.value || '';
  const unidadeVal = document.getElementById('c-unidade')?.value || '';
  const subunidadeVal = document.getElementById('c-subunidade')?.value || '';

  // envia NULL quando a opção "Unidades sem empresa" (value='-1') for selecionada
  const empresa_id = (empresaVal === '' || empresaVal === '-1') ? null : parseInt(empresaVal);
  const unidade_id = unidadeVal !== '' ? parseInt(unidadeVal) : null;
  const subunidade_id = subunidadeVal !== '' ? parseInt(subunidadeVal) : null;

  const r = await fetch('api/admin.php?action=create', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({nome, email, senha, super: isSuper, empresa_id, unidade_id, subunidade_id})
  });
  const d = await r.json();
  if (!r.ok) { toast('Erro', d.error, 'error'); return; }
  toast('Usuário criado com sucesso.','','success');
  closeCreate();
  loadUsers();
}

// Carrega empresas, unidades e subunidades para o seletor de almoxarifado
async function loadAlmoxOptions() {
  try {
    if (!empresasCache) {
      const re = await fetch('api/grupos.php?tab=empresas'); empresasCache = re.ok ? await re.json() : [];
    }
    if (!unidadesCache) {
      const ru = await fetch('api/grupos.php?tab=unidades'); unidadesCache = ru.ok ? await ru.json() : [];
    }
    if (!subunidadesCache) {
      const rs = await fetch('api/grupos.php?tab=subunidades'); subunidadesCache = rs.ok ? await rs.json() : [];
    }

    const selE = document.getElementById('c-empresa');
    if (selE) {
      selE.innerHTML = '<option value="">-- Selecionar empresa (ou Unidades sem empresa) --</option><option value="-1">Unidades sem empresa</option>' +
        (empresasCache.map(e => `<option value="${e.ID_EMPRESA}">${esc(e.RAZAO_SOCIAL)}</option>`).join(''));
    }
    const selU = document.getElementById('c-unidade'); if (selU) selU.innerHTML = '<option value="">-- Selecione unidade --</option>';
    const selS = document.getElementById('c-subunidade'); if (selS) selS.innerHTML = '<option value="">-- Selecione subunidade --</option>';

    // também popula selects do modal de realocação quando presentes
    const selReE = document.getElementById('re-empresa');
    if (selReE) {
      selReE.innerHTML = '<option value="">-- Selecionar empresa (ou Unidades sem empresa) --</option><option value="-1">Unidades sem empresa</option>' +
        (empresasCache.map(e => `<option value="${e.ID_EMPRESA}">${esc(e.RAZAO_SOCIAL)}</option>`).join(''));
    }
    const selReU = document.getElementById('re-unidade'); if (selReU) selReU.innerHTML = '<option value="">-- Selecione unidade --</option>';
    const selReS = document.getElementById('re-subunidade'); if (selReS) selReS.innerHTML = '<option value="">-- Selecione subunidade --</option>';
  } catch (err) {
    console.error('Erro ao carregar almoxarifado', err);
  }
}

// Eventos para os controles de vinculo
const _chk = document.getElementById('c-super');
if (_chk) _chk.addEventListener('change', function(){ const w=document.getElementById('c-almoxarifado-wrap'); if (w) w.style.display = this.checked ? 'none' : ''; });
const _selE = document.getElementById('c-empresa');
if (_selE) _selE.addEventListener('change', function(){
  const val = this.value;
  const unis = (unidadesCache || []).filter(u => val === '-1' ? u.EMPRESA_ID === null : u.EMPRESA_ID === parseInt(val));
  const selU = document.getElementById('c-unidade');
  if (selU) selU.innerHTML = '<option value="">-- Selecione unidade --</option>' + unis.map(u => `<option value="${u.ID_UNIDADE}">${esc(u.NOME)}</option>`).join('');
  const selS = document.getElementById('c-subunidade'); if (selS) selS.innerHTML = '<option value="">-- Selecione subunidade --</option>';
});
const _selU = document.getElementById('c-unidade');
if (_selU) _selU.addEventListener('change', function(){
  const id = this.value ? parseInt(this.value) : null;
  const subs = (subunidadesCache || []).filter(s => s.UNIDADE_ID !== null && s.UNIDADE_ID == id);
  const selS = document.getElementById('c-subunidade');
  if (selS) selS.innerHTML = '<option value="">-- Selecione subunidade --</option>' + subs.map(s => `<option value="${s.ID_SUBUNIDADE}">${esc(s.NOME)}</option>`).join('');
});
// Eventos para selects do modal de realocação
const _selRE = document.getElementById('re-empresa');
if (_selRE) _selRE.addEventListener('change', function(){
  const val = this.value;
  const unis = (unidadesCache || []).filter(u => val === '-1' ? u.EMPRESA_ID === null : u.EMPRESA_ID === parseInt(val));
  const selU = document.getElementById('re-unidade');
  if (selU) selU.innerHTML = '<option value="">-- Selecione unidade --</option>' + unis.map(u => `<option value="${u.ID_UNIDADE}">${esc(u.NOME)}</option>`).join('');
  const selS = document.getElementById('re-subunidade'); if (selS) selS.innerHTML = '<option value="">-- Selecione subunidade --</option>';
});
const _selRU = document.getElementById('re-unidade');
if (_selRU) _selRU.addEventListener('change', function(){
  const id = this.value ? parseInt(this.value) : null;
  const subs = (subunidadesCache || []).filter(s => s.UNIDADE_ID !== null && s.UNIDADE_ID == id);
  const selS = document.getElementById('re-subunidade');
  if (selS) selS.innerHTML = '<option value="">-- Selecione subunidade --</option>' + subs.map(s => `<option value="${s.ID_SUBUNIDADE}">${esc(s.NOME)}</option>`).join('');
});

/* ── Redefinir senha ── */
function openReset(id, nome) {
  resetTargetId = id;
  document.getElementById('reset-label').textContent = `Redefinir senha de: ${nome}`;
  document.getElementById('r-senha').value = '';
  document.getElementById('modal-reset').classList.remove('hidden');
  document.getElementById('r-senha').focus();
}
function closeReset() { document.getElementById('modal-reset').classList.add('hidden'); resetTargetId = null; }

async function saveReset() {
  const nova_senha = document.getElementById('r-senha').value.trim();
  const r = await fetch('api/admin.php?action=reset_senha', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id: resetTargetId, nova_senha})
  });
  const d = await r.json();
  if (!r.ok) { toast('Erro', d.error, 'error'); return; }
  toast('Senha redefinida.','','success');
  closeReset();
}

/* ── Realocar usuário ── */
let reallocateTargetId = null;
function openReallocate(id) {
  reallocateTargetId = id;
  const u = usersData.find(x => x.ID === id);
  if (!u) return;
  document.getElementById('re-username').textContent = u.NOME || '';
  // garante opções carregadas e pré-seleciona
  loadAlmoxOptions().then(() => {
    const eSel = document.getElementById('re-empresa');
    if (eSel) {
      // mostra "Unidades sem empresa" quando EMPRESA_ID for null
      eSel.value = u.EMPRESA_ID === null ? '-1' : (u.EMPRESA_ID ?? '');
      eSel.dispatchEvent(new Event('change'));
    }
    const uSel = document.getElementById('re-unidade'); if (uSel && u.UNIDADE_ID !== null) uSel.value = u.UNIDADE_ID;
    if (uSel) uSel.dispatchEvent(new Event('change'));
    const sSel = document.getElementById('re-subunidade'); if (sSel && u.SUBUNIDADE_ID !== null) sSel.value = u.SUBUNIDADE_ID;
  }).catch(e=>console.error(e));
  document.getElementById('modal-reallocate').classList.remove('hidden');
}
function closeReallocate() { document.getElementById('modal-reallocate').classList.add('hidden'); reallocateTargetId = null; }
async function saveReallocate() {
  const id = reallocateTargetId;
  if (!id) { toast('ID inválido', 'error'); return; }
  const empresaVal = document.getElementById('re-empresa')?.value || '';
  const unidadeVal = document.getElementById('re-unidade')?.value || '';
  const subunidadeVal = document.getElementById('re-subunidade')?.value || '';
  const empresa_id = empresaVal !== '' ? parseInt(empresaVal) : null;
  const unidade_id = unidadeVal !== '' ? parseInt(unidadeVal) : null;
  const subunidade_id = subunidadeVal !== '' ? parseInt(subunidadeVal) : null;

  try {
    const r = await fetch('api/admin.php?action=realocar', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id, empresa_id, unidade_id, subunidade_id})
    });
    const d = await r.json();
    if (!r.ok) { toast('Erro', d.error || 'Erro ao salvar', 'error'); return; }
    toast('Realocação salva.', '', 'success');
    closeReallocate();
    loadUsers();
  } catch (err) {
    console.error(err);
    toast('Erro ao salvar realocação', 'error');
  }
}

/* ── Toggle ativo ── */
async function toggleActive(id) {
  const u = usersData.find(x => x.ID === id);
  const acao = u?.IS_ACTIVE ? 'desativar' : 'reativar';
  if (!confirm(`Tem certeza que deseja ${acao} "${u?.NOME}"?`)) return;
  const r = await fetch('api/admin.php?action=toggle_active', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });
  const d = await r.json();
  if (!r.ok) { toast('Erro', d.error, 'error'); return; }
  toast(`Usuário ${d.is_active ? 'reativado' : 'desativado'}.`, '', 'success');
  loadUsers();
}

/* ── Toggle super ── */
async function toggleSuper(id) {
  const u = usersData.find(x => x.ID === id);
  const acao = u?.SUPER_USER ? 'revogar privilégio de admin de' : 'tornar admin';
  if (!confirm(`Tem certeza que deseja ${acao} "${u?.NOME}"?`)) return;
  const r = await fetch('api/admin.php?action=toggle_super', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });
  const d = await r.json();
  if (!r.ok) { toast('Erro', d.error, 'error'); return; }
  toast(`Privilégio ${d.super_user ? 'concedido' : 'revogado'}.`, '', 'success');
  loadUsers();
}

/* ── Mostrar/ocultar senha ── */
function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.innerHTML = show ? EYEOFF : EYE;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCreate(); closeReset(); }
});
